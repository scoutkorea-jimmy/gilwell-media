<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#002D56">
<title>Dreampath PMO</title>
<meta name="robots" content="noindex, nofollow">

<!-- Favicon = full project mark (swapped from the 32×32 tab glyph to the canonical
     logo SVG per user 2026-04-24 spec). Apple touch icon stays on app-icon. -->
<link rel="icon" type="image/svg+xml" href="/img/dreampath/logo-mark.svg">
<link rel="alternate icon" href="/img/dreampath/favicon.svg">
<link rel="apple-touch-icon" href="/img/dreampath/logo-dreampath-app-icon.svg">

<!-- English-only UI. Google Sans Flex is the sole webfont; monospace needs use
     the OS-native ui-monospace stack so they never fall back to a Korean
     system face (e.g. AppleMyungjo/AppleGothic/"Alice"-looking serifs) when
     a CDN font fails to load. All Korean fallbacks and JetBrains Mono CDN
     dropped intentionally per 2026-04-24 owner spec. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap">

<style>
/* ====================================================================
   Dreampath v2 — ERP token system
   Source: user-supplied "PMO Style Tokens v2 (ERP)" + "Layout Draft 1".
   Kept inline per DREAMPATH.md Section 3.1 (single-source CSS).
   ==================================================================== */
:root {
  /* Brand (CUFS) — constant across themes */
  --navy: #002D56; --navy-700: #01437E; --navy-600: #0A5C9E;
  --green: #146E7A; --gold: #8D714E;

  /* Cool grays — Tailwind-aligned (light theme default) */
  --g-950: #0B1220; --g-900: #111827; --g-800: #1F2937;
  --g-700: #374151; --g-600: #4B5563; --g-500: #6B7280;
  --g-400: #9CA3AF; --g-300: #D1D5DB; --g-200: #E5E7EB;
  --g-150: #EEF1F5; --g-100: #F3F4F6; --g-050: #F9FAFB;
  --white: #FFFFFF;

  /* Surfaces — abstraction over "white" so dark mode can swap cleanly. */
  --surface:   #FFFFFF;   /* primary panel bg */
  --surface-2: var(--g-050); /* alt / striped rows */

  /* Theme-aware emphasis color for UI chrome (pinned titles, active icons,
     highlighted links). Light mode uses deep navy for drama; dark mode
     uses the lighter navy-600 so it stays readable on dark surfaces. */
  --accent: var(--navy);

  --text: var(--g-900); --text-2: var(--g-700); --text-3: var(--g-500);
  --text-on-navy: #FFFFFF; --text-on-navy-dim: #B8C5D4;

  --ok: #0F7A3B; --warn: #B25E00; --alert: #B42318; --info: var(--navy-600);
  --ok-bg: #EDF7F0; --warn-bg: #FCF1E1; --alert-bg: #FCECEA; --info-bg: #EAF2FA;

  --r-sm: 2px; --r-md: 3px; --r-lg: 4px;

  --bd: 1px solid var(--g-200);
  --bd-strong: 1px solid var(--g-300);
  --bd-navy: 1px solid var(--navy);

  --shadow-pop: 0 2px 8px rgba(17,24,39,0.08), 0 0 0 1px rgba(17,24,39,0.05);
  --focus-ring: 0 0 0 2px var(--navy-600), 0 0 0 4px rgba(10,92,158,0.25);

  /* Stack order:
     1. Google Sans Flex (webfont, variable, loaded above)
     2. -apple-system / BlinkMacSystemFont / Segoe UI / Roboto — system sans on
        every major OS so latency never forces a font swap
     3. system-ui / sans-serif as final safety net
     NO Korean-face fallbacks — the UI is English-only; adding Apple SD
     Gothic Neo / Noto Sans KR here was causing Korean system serifs to
     render digits on some machines when Google Sans Flex was slow. */
  --font: "Google Sans Flex", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Helvetica, Arial, system-ui, sans-serif;
  /* Real monospace uses OS stack only — ui-monospace maps to SF Mono (macOS) /
     Cascadia Mono (Win) / DejaVu Sans Mono (Linux). Dropping the JetBrains
     Mono CDN step prevents the network-hiccup cascade that ended in the
     Korean system serif ("Alice-like") being used for digits. */
  --font-mono: ui-monospace, "SF Mono", "Menlo", "Cascadia Mono", "Consolas",
               "Liberation Mono", monospace;
  --fs-10: 10px; --fs-11: 11px; --fs-12: 12px; --fs-13: 13px;
  --fs-14: 14px; --fs-15: 15px; --fs-16: 16px; --fs-18: 18px;
  --fs-20: 20px; --fs-24: 24px;

  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-8: 32px; --s-10: 40px;

  --row-compact: 28px;
  --row-default: 32px;
  --row-comfort: 40px;
  --touch-min: 40px;

  --ease-swift: cubic-bezier(0.2, 0, 0, 1);
  --ease-decel: cubic-bezier(0.05, 0.7, 0.1, 1);
  --ease-spring: cubic-bezier(0.5, 1.6, 0.3, 1);
  --dur-instant: 80ms; --dur-swift: 120ms;
  --dur-moderate: 200ms; --dur-reveal: 280ms;

  --dv-1: #002D56; --dv-2: #0A5C9E; --dv-3: #146E7A; --dv-4: #8D714E;
  --dv-5: #B25E00; --dv-6: #5D4EA8; --dv-7: #9C2C6F; --dv-8: #495057;

  --side-w: 232px;
}

/* ====================================================================
   Dark theme — activated by html[data-theme="dark"] (set via Account page
   toggle or automatic via prefers-color-scheme when data-theme="system").
   We swap the neutral scale + surfaces but keep brand navy/green/gold
   intact so the CUFS palette reads the same across themes.
   ==================================================================== */
html[data-theme="dark"] {
  --g-050: #0F172A; --g-100: #111827; --g-150: #1F2937;
  --g-200: #253041; --g-300: #374151; --g-400: #4B5563;
  --g-500: #6B7280; --g-600: #9CA3AF; --g-700: #C4CBD4;
  --g-800: #E5E7EB; --g-900: #F9FAFB; --g-950: #FFFFFF;

  --surface:   #111827;   /* panels */
  --surface-2: #1F2937;   /* striped rows, muted surfaces */

  --text:   #F9FAFB;
  --text-2: #D1D5DB;
  --text-3: #9CA3AF;

  /* Emphasis — use the lighter navy so it reads on dark bg (~4.8:1 contrast).
     Using var(--navy) here would be invisible — that was the pinned-row bug. */
  --accent: #5AA9E6;

  /* Status backgrounds — tinted for dark surfaces (muted instead of bright) */
  --ok-bg: #10281B; --warn-bg: #2D1F0D; --alert-bg: #2C1013; --info-bg: #0D1E35;

  /* Status text — bump the saturation so tags stay legible on dark status tints */
  --ok:    #3DCC73;
  --warn:  #F0A24A;
  --alert: #F26868;
  --info:  #5AA9E6;

  --bd:        1px solid #253041;
  --bd-strong: 1px solid #374151;

  /* Shadow is less visible on dark — drop the lift, keep the 1px hairline */
  --shadow-pop: 0 2px 10px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04);
}
/* Auto-follow OS when user chose "system" — use the same overrides. */
@media (prefers-color-scheme: dark) {
  html[data-theme="system"] {
    --g-050: #0F172A; --g-100: #111827; --g-150: #1F2937;
    --g-200: #253041; --g-300: #374151; --g-400: #4B5563;
    --g-500: #6B7280; --g-600: #9CA3AF; --g-700: #C4CBD4;
    --g-800: #E5E7EB; --g-900: #F9FAFB; --g-950: #FFFFFF;
    --surface: #111827; --surface-2: #1F2937;
    --text: #F9FAFB; --text-2: #D1D5DB; --text-3: #9CA3AF;
    --accent: #5AA9E6;
    --ok-bg: #10281B; --warn-bg: #2D1F0D; --alert-bg: #2C1013; --info-bg: #0D1E35;
    --ok: #3DCC73; --warn: #F0A24A; --alert: #F26868; --info: #5AA9E6;
    --bd: 1px solid #253041; --bd-strong: 1px solid #374151;
    --shadow-pop: 0 2px 10px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04);
  }
}

/* Per-user density, persisted in localStorage */
html[data-density="compact"] { --row-default: 28px; --touch-min: 32px; }
html[data-density="comfort"] { --row-default: 40px; --touch-min: 44px; }

@media (prefers-reduced-motion: reduce) {
  :root { --dur-instant: 0ms; --dur-swift: 0ms; --dur-moderate: 0ms; --dur-reveal: 0ms; }
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    transition-duration: 0.001ms !important;
  }
}
@media (prefers-contrast: more) {
  :root { --text-2: #1F2937; --text-3: #374151; --g-200: #9CA3AF; }
}

/* Reset + base */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { height: 100%; font-family: var(--font); }
body {
  min-height: 100%;
  background: var(--g-050);
  color: var(--text);
  font-family: var(--font);
  font-size: var(--fs-13);
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
/* [CASE STUDY 2026-04-24 — global font enforcement]
   Previous attempt left --font on body only; form elements + some
   nested containers were falling back to system default because the
   `font` shorthand didn't override on everything. We now explicitly
   force font-family on every text-bearing element. */
body, button, input, select, textarea, optgroup, option, pre, code, kbd, samp, label {
  font-family: var(--font);
}
code, kbd, samp, pre, .mono, .dp-vh-version { font-family: var(--font-mono); }
a { color: var(--navy-600); text-decoration: none; }
a:hover { text-decoration: underline; }
button { cursor: pointer; }

.dp-skip {
  position: absolute; left: 0; top: -44px;
  background: var(--navy); color: #fff;
  padding: 8px 14px; font-size: var(--fs-12); font-weight: 600;
  z-index: 9999; border-bottom-right-radius: var(--r-sm);
}
.dp-skip:focus, .dp-skip:focus-visible { top: 0; outline: none; }

:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--r-sm); }
:focus:not(:focus-visible) { outline: none; }
.dp-sr-only {
  position: absolute !important; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
  white-space: nowrap; border: 0;
}

/* Signature thread — navy→green, 2px, top of every page + print headers */
.dp-thread {
  height: 2px;
  background: linear-gradient(90deg, var(--navy) 0%, var(--navy-600) 40%, var(--green) 100%);
  flex-shrink: 0;
}

/* ====================================================================
   Shell
   ==================================================================== */
.dp-app { display: grid; grid-template-columns: var(--side-w) 1fr; min-height: 100vh; }

.dp-side {
  background: var(--navy); color: var(--text-on-navy);
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto; display: flex; flex-direction: column;
}
.dp-side-brand {
  padding: 14px 16px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 10px;
}
.dp-side-brand img { width: 28px; height: 28px; flex-shrink: 0; }
.dp-side-brand .wm { display: flex; flex-direction: column; line-height: 1.2; }
.dp-side-brand .wm strong {
  color: #fff; font-size: var(--fs-13); font-weight: 700; letter-spacing: 0.01em;
}
.dp-side-brand .wm span {
  color: var(--text-on-navy-dim); font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
}

.dp-side-nav { flex: 1; padding: 8px 0; }
.dp-side-nav h3 {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-on-navy-dim);
  padding: 12px 16px 6px; margin: 0; font-weight: 600;
}
.dp-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px; height: var(--row-default);
  color: var(--text-on-navy-dim);
  font-size: var(--fs-13); font-weight: 400;
  background: none; border: none; width: 100%; text-align: left;
  font-family: inherit; cursor: pointer; position: relative;
  transition: background var(--dur-swift) var(--ease-swift), color var(--dur-swift) var(--ease-swift);
}
.dp-nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
.dp-nav-item[aria-current="page"] {
  background: rgba(255,255,255,0.08); color: #fff; font-weight: 500;
}
.dp-nav-item[aria-current="page"]::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px; background: var(--surface);
}
.dp-nav-item .ico {
  width: 14px; height: 14px; flex-shrink: 0;
  background-color: currentColor;
  -webkit-mask-image: var(--dp-icon); mask-image: var(--dp-icon);
  -webkit-mask-size: 14px 14px; mask-size: 14px 14px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
}
.dp-nav-item .dp-nav-flag {
  width: 18px; height: 18px;
  display: grid; place-items: center;
  font-size: 13px; line-height: 1; flex-shrink: 0;
  font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", var(--font);
}
.dp-nav-item .count {
  margin-left: auto;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-on-navy-dim);
  background: rgba(255,255,255,0.08);
  padding: 1px 5px; border-radius: var(--r-sm);
}

.dp-side-foot {
  padding: 12px 16px 14px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.dp-side-session {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; color: var(--text-on-navy-dim);
  padding: 6px 10px; margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.1); border-radius: var(--r-sm);
  background: rgba(255,255,255,0.03);
}
.dp-side-session strong {
  color: #fff; font-family: var(--font-mono); font-size: 11px; font-weight: 500;
}
.dp-side-session.is-warning {
  background: rgba(180,35,24,0.18); border-color: rgba(242,104,104,0.4);
}
.dp-side-session.is-warning strong { color: #FFC5C5; }
.dp-side-version {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; color: var(--text-on-navy-dim);
  padding: 0 10px; margin-bottom: 10px;
  letter-spacing: 0.04em;
}
.dp-side-version .dp-ver-num {
  font-family: var(--font); font-feature-settings: "tnum" 1;
  font-size: 11px; color: rgba(255,255,255,0.75); font-weight: 500;
}
.dp-side-version a {
  color: var(--text-on-navy-dim); font-size: 10px; text-decoration: none;
}
.dp-side-version a:hover { color: #fff; text-decoration: underline; }
.dp-side-user { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
.dp-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--green); color: #fff;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.dp-side-user .who { color: #fff; font-size: var(--fs-12); font-weight: 500; line-height: 1.2; }
.dp-side-user .role { color: var(--text-on-navy-dim); font-size: 10px; letter-spacing: 0.02em; line-height: 1.2; margin-top: 2px; }
.dp-signout {
  width: 100%; height: var(--row-compact);
  background: transparent; color: var(--text-on-navy-dim);
  border: 1px solid rgba(255,255,255,0.12); border-radius: var(--r-sm);
  font-size: var(--fs-12); font-weight: 500;
  transition: background var(--dur-swift), color var(--dur-swift);
}
.dp-signout:hover { background: rgba(180,35,24,0.15); color: #fff; border-color: rgba(180,35,24,0.4); }

/* ====================================================================
   Main column
   ==================================================================== */
.dp-main { display: flex; flex-direction: column; min-width: 0; }
.dp-topbar {
  display: flex; align-items: center; gap: var(--s-4);
  padding: 0 var(--s-5); height: 48px;
  background: var(--surface); border-bottom: var(--bd);
  position: sticky; top: 0; z-index: 20;
}
.dp-mob-menu { display: none; }
.dp-crumbs {
  display: flex; align-items: center; gap: 8px;
  font-size: var(--fs-12); color: var(--text-3);
}
.dp-crumbs .sep { color: var(--g-300); }
.dp-crumbs strong { color: var(--text); font-weight: 500; }
.dp-top-spacer { flex: 1; }

.dp-search { position: relative; width: 320px; max-width: 40vw; }
.dp-search input {
  width: 100%; height: var(--row-compact);
  padding: 0 36px 0 30px;
  border: 1px solid var(--g-300); border-radius: var(--r-sm);
  background: var(--surface); color: var(--text);
  font: inherit; font-size: var(--fs-12);
}
.dp-search input:focus { outline: none; border-color: var(--navy-600); box-shadow: 0 0 0 1px var(--navy-600); }
.dp-search::before {
  content: ""; position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px;
  background-color: var(--text-3);
  -webkit-mask: url('/img/dreampath/icons/search.svg') center/14px 14px no-repeat;
          mask: url('/img/dreampath/icons/search.svg') center/14px 14px no-repeat;
  pointer-events: none;
}
.dp-search kbd {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  border: var(--bd); padding: 1px 5px; border-radius: var(--r-sm); background: var(--g-100);
  pointer-events: none;
}

.dp-switcher {
  display: inline-flex; background: var(--g-100); border: var(--bd); padding: 2px; gap: 2px;
  border-radius: var(--r-sm);
}
.dp-switcher button {
  height: 22px; padding: 0 8px;
  font: inherit; font-size: 11px; font-weight: 500;
  background: transparent; border: none; color: var(--text-2);
  border-radius: var(--r-sm); cursor: pointer;
}
.dp-switcher button.on {
  background: var(--surface); color: var(--text);
  box-shadow: 0 0 0 1px var(--g-300);
}

.dp-iconbtn {
  width: var(--row-compact); height: var(--row-compact);
  display: grid; place-items: center;
  background: transparent; border: 1px solid transparent; border-radius: var(--r-sm);
  color: var(--text-2); position: relative;
}
.dp-iconbtn:hover { background: var(--g-100); color: var(--text); }
.dp-iconbtn .ico {
  width: 14px; height: 14px;
  background-color: currentColor;
  -webkit-mask-size: 14px 14px; mask-size: 14px 14px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  -webkit-mask-image: var(--dp-icon); mask-image: var(--dp-icon);
}
.dp-iconbtn .dot {
  position: absolute; top: 5px; right: 5px;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--alert);
}

.dp-btn {
  /* Center the icon + label pair horizontally inside every button. Earlier
     version relied on content length to sit flush-left, which made
     multi-word labels ("Change photo", "Remove photo") look uneven when
     the buttons were stretched to equal widths. */
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  text-align: center;
  height: var(--row-default); padding: 0 12px;
  font: inherit; font-size: var(--fs-13); font-weight: 500;
  border: 1px solid transparent; border-radius: var(--r-sm);
  cursor: pointer;
  transition: background var(--dur-swift), border-color var(--dur-swift);
}
.dp-btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }
.dp-btn-primary { background: var(--navy); color: #fff; border-color: var(--navy); }
.dp-btn-primary:hover { background: var(--navy-700); border-color: var(--navy-700); }
.dp-btn-secondary { background: var(--surface); color: var(--text); border-color: var(--g-300); }
.dp-btn-secondary:hover { background: var(--g-100); }
.dp-btn-ghost { background: transparent; color: var(--text-2); }
.dp-btn-ghost:hover { background: var(--g-100); color: var(--text); }
/* Danger button border is a tinted alert color — derive from --alert with
   low opacity so it adapts to whichever alert hue the current theme uses
   instead of locking to a light-mode-only pink literal. */
.dp-btn-danger { background: var(--surface); color: var(--alert); border-color: rgba(180,35,24,0.35); }
html[data-theme="dark"] .dp-btn-danger,
html[data-theme="system"] .dp-btn-danger { border-color: rgba(242,104,104,0.45); }
.dp-btn-danger:hover { background: var(--alert-bg); }
.dp-btn-sm { height: var(--row-compact); padding: 0 8px; font-size: var(--fs-12); }
.dp-btn-ico {
  width: 14px; height: 14px;
  background-color: currentColor;
  -webkit-mask-size: 14px 14px; mask-size: 14px 14px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
}

/* Page body — fills the main column; ERP grids can sprawl as wide as needed. */
.dp-page { padding: var(--s-6) var(--s-6); width: 100%; }
.dp-page-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: var(--s-5); flex-wrap: wrap; gap: 8px;
}
.dp-page-head h1 {
  margin: 0; font-size: var(--fs-20); font-weight: 600; letter-spacing: -0.005em;
  color: var(--text);
}
.dp-page-head .meta { color: var(--text-3); font-size: var(--fs-12); }
.dp-page-head .meta strong { color: var(--text-2); font-weight: 600; }

.dp-h2 {
  font-size: var(--fs-11); letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); margin: 0 0 var(--s-3); font-weight: 600;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.dp-h2 a { color: var(--text-3); font-size: 11px; letter-spacing: normal; text-transform: none; }
.dp-h2 a:hover { color: var(--navy-600); text-decoration: none; }

/* Stat strip — 5 chips, colored left border by tone */
.dp-stat-strip {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 0; margin-bottom: var(--s-6);
  border: var(--bd); background: var(--surface);
}
.dp-stat {
  padding: 12px 16px;
  border-right: var(--bd); border-left: 2px solid transparent;
  display: flex; flex-direction: column; gap: 4px;
  text-align: left; background: var(--surface);
  border-top: none; border-bottom: none;
  font: inherit; cursor: pointer;
  transition: background var(--dur-swift);
}
.dp-stat:last-child { border-right: none; }
.dp-stat:hover { background: var(--g-100); }
.dp-stat .lbl {
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); font-weight: 600;
}
.dp-stat .val { display: flex; align-items: baseline; gap: 8px; }
.dp-stat .n {
  /* Google Sans Flex with tabular figures for stat values. We stay on the UI
     font (not monospace) and rely on font-feature-settings tnum/lnum to keep
     digit widths aligned, so the stat strip reads as one piece with the
     surrounding copy. See Section 20 of DREAMPATH.md for why the mono font
     chain was removed from the page (CDN fallback hazard). */
  font-family: var(--font);
  font-feature-settings: "tnum" 1, "lnum" 1;
  font-variant-numeric: tabular-nums lining-nums;
  font-size: 24px; font-weight: 600;
  color: var(--text); line-height: 1; letter-spacing: -0.02em;
}
.dp-stat .sub { font-size: var(--fs-12); color: var(--text-3); line-height: 1.4; }
.dp-stat.alert { border-left-color: var(--alert); }
.dp-stat.alert .n { color: var(--alert); }
.dp-stat.warn  { border-left-color: var(--warn); }
.dp-stat.warn  .n { color: var(--warn); }
.dp-stat.info  { border-left-color: var(--navy-600); }
.dp-stat.ok    { border-left-color: var(--ok); }
.dp-stat.ok    .n { color: var(--ok); }

/* Home grid */
.dp-home {
  display: grid; grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
  gap: var(--s-5); align-items: flex-start;
}
.dp-home-col { display: flex; flex-direction: column; gap: var(--s-5); min-width: 0; }

/* Panel */
.dp-panel { background: var(--surface); border: var(--bd); }
.dp-panel-head {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 10px 14px; border-bottom: var(--bd);
}
.dp-panel-head h3 {
  margin: 0; font-size: var(--fs-13); font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.dp-panel-head .count { font-size: 11px; color: var(--text-3); font-weight: 400; }
.dp-panel-head a { font-size: 11px; color: var(--text-3); }
.dp-panel-head a:hover { color: var(--navy-600); text-decoration: none; }
.dp-panel-body.pad { padding: 14px; }

/* Audit-row style (recent/approvals/activity) */
.dp-audit-row {
  display: grid; grid-template-columns: 1fr auto;
  gap: 12px; padding: 10px 14px;
  border-bottom: 1px solid var(--g-150); align-items: center;
  text-align: left; width: 100%;
  background: var(--surface); border-left: none; border-right: none; border-top: none;
  font: inherit;
}
.dp-audit-row:last-child { border-bottom: none; }
.dp-audit-row:hover { background: var(--g-150); }
.dp-audit-row[role="button"] { cursor: pointer; }
.dp-audit-row .main { min-width: 0; }
.dp-audit-row .title {
  font-size: var(--fs-13); font-weight: 500; color: var(--text);
  display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
}
.dp-audit-row .meta {
  font-size: 11px; color: var(--text-3);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.dp-audit-row .meta .ts { font-family: var(--font-mono); }
.dp-audit-row .meta .who { font-weight: 500; color: var(--text-2); }
.dp-audit-row .actions { display: flex; gap: 6px; flex-shrink: 0; }

/* Post / announcement list */
.dp-post-item {
  padding: 12px 14px;
  border-bottom: 1px solid var(--g-150);
  display: block; width: 100%; text-align: left;
  background: var(--surface); border-left: none; border-right: none; border-top: none;
  font: inherit; cursor: pointer;
  transition: background var(--dur-swift);
}
.dp-post-item:last-child { border-bottom: none; }
.dp-post-item:hover { background: var(--g-150); }
.dp-post-item .t {
  font-size: var(--fs-13); font-weight: 500; color: var(--text);
  margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
}
.dp-post-item .excerpt {
  font-size: var(--fs-12); color: var(--text-2); line-height: 1.5;
  margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.dp-post-item .meta { font-size: 11px; color: var(--text-3); display: flex; gap: 8px; align-items: center; }
.dp-post-item .meta .who { font-weight: 500; color: var(--text-2); }

.dp-pin {
  display: inline-block; width: 12px; height: 12px; flex-shrink: 0;
  background-color: var(--warn);
  -webkit-mask: url('/img/dreampath/icons/scroll.svg') center/12px 12px no-repeat;
          mask: url('/img/dreampath/icons/scroll.svg') center/12px 12px no-repeat;
}
.dp-unread-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--navy-600); flex-shrink: 0;
}

/* Tables — ERP staple */
.dp-table { width: 100%; border-collapse: collapse; font-size: var(--fs-13); background: var(--surface); }
.dp-table th, .dp-table td {
  text-align: left; padding: 8px 12px;
  border-bottom: var(--bd); vertical-align: middle;
}
.dp-table thead th {
  background: var(--g-100);
  font-size: var(--fs-12); font-weight: 600;
  color: var(--text-2); letter-spacing: 0.02em; text-transform: uppercase;
  height: var(--row-default);
}
.dp-table tbody tr { transition: background var(--dur-instant); }
.dp-table tbody tr:hover { background: var(--g-150); cursor: pointer; }
/* Approval status row tints (Minutes) — use status-bg tokens so dark mode
   auto-inverts. Earlier hardcoded cream/mint/grey literals turned into
   illegible light-on-light rows when dark theme was active. */
.dp-table tbody tr.dp-row-approved { background: var(--ok-bg); }
.dp-table tbody tr.dp-row-approved:hover { background: var(--ok-bg); filter: brightness(0.96); }
.dp-table tbody tr.dp-row-pending  { background: var(--warn-bg); }
.dp-table tbody tr.dp-row-pending:hover  { background: var(--warn-bg); filter: brightness(0.96); }
.dp-table tbody tr.dp-row-rejected { background: var(--g-100); color: var(--text-3); }
.dp-table tbody tr.dp-row-rejected:hover { background: var(--g-150); }
.dp-table tbody td { height: var(--row-default); }
/* Uniform-row variant: every row is exactly --row-comfort (40px) tall and all
   chips inside share the same padding/font, so a user row with a long email +
   "Admin · all" preset tag reads the same height as a row with empty cells. */
.dp-table.dp-table-uniform tbody tr { height: var(--row-comfort); }
.dp-table.dp-table-uniform tbody td { height: var(--row-comfort); padding-top: 0; padding-bottom: 0; }
.dp-table.dp-table-uniform .dp-tag {
  min-height: 20px; padding: 2px 8px; font-size: 11px; line-height: 16px;
  display: inline-flex; align-items: center;
}
.dp-table.dp-table-uniform .dp-btn-sm {
  min-height: 24px; padding: 0 10px; font-size: 11px;
}
.dp-table tbody tr:last-child td { border-bottom: none; }
.dp-table .mono { font-family: var(--font-mono); font-size: var(--fs-12); color: var(--text-3); }
.dp-table td.num { font-family: var(--font-mono); text-align: right; }

/* Tags */
.dp-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 6px; font-size: 11px; font-weight: 500;
  border-radius: var(--r-sm); border: 1px solid; line-height: 1.4;
}
.dp-tag.ok    { background: var(--ok-bg);    color: var(--ok);    border-color: rgba(15,122,59,0.2); }
.dp-tag.warn  { background: var(--warn-bg);  color: var(--warn);  border-color: rgba(178,94,0,0.2); }
.dp-tag.alert { background: var(--alert-bg); color: var(--alert); border-color: rgba(180,35,24,0.2); }
.dp-tag.info  { background: var(--info-bg);  color: var(--info);  border-color: rgba(10,92,158,0.2); }
.dp-tag.neutral { background: var(--g-100); color: var(--text-2); border-color: var(--g-200); }

/* Right rail components */
.dp-schedule-row {
  display: grid; grid-template-columns: 56px 1fr;
  gap: 12px; padding: 10px 14px;
  border-bottom: 1px solid var(--g-150);
}
.dp-schedule-row:last-child { border-bottom: none; }
.dp-schedule-row .t { font-family: var(--font-mono); font-size: var(--fs-13); font-weight: 500; color: var(--text); }
.dp-schedule-row .body { min-width: 0; }
.dp-schedule-row .body .title { font-size: var(--fs-13); color: var(--text); font-weight: 500; margin-bottom: 2px; }
.dp-schedule-row .body .sub { font-size: 11px; color: var(--text-3); }

.dp-team-online { display: flex; gap: 6px; flex-wrap: wrap; padding: 14px; }
.dp-team-online .dp-avatar { width: 28px; height: 28px; font-size: 10px; }
.dp-team-online .more {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--g-100); color: var(--text-3); font-size: 10px; font-weight: 500;
  display: grid; place-items: center; border: 1px dashed var(--g-300);
}

.dp-progress { padding: 14px; }
.dp-progress .top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.dp-progress .val { font-family: var(--font-mono); font-size: 16px; color: var(--text); font-weight: 500; }
.dp-progress .bar {
  height: 6px; background: var(--g-200); border-radius: 3px; overflow: hidden; margin-bottom: 10px;
}
.dp-progress .fill {
  height: 100%; background: var(--green);
  transition: width var(--dur-reveal) var(--ease-decel);
}
.dp-progress .legend {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
  font-size: 11px; color: var(--text-3);
}
.dp-progress .legend > div { display: flex; flex-direction: column; gap: 2px; }
.dp-progress .legend strong {
  color: var(--text); font-weight: 600;
  font-family: var(--font-mono); font-size: var(--fs-13);
}

/* Command palette */
.dp-cmd-backdrop {
  position: fixed; inset: 0; background: rgba(17,24,39,0.4);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 15vh; z-index: 200;
  animation: fadein var(--dur-swift) var(--ease-swift);
}
@keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
.dp-cmd {
  width: 560px; max-width: 90vw;
  background: var(--surface); border: var(--bd);
  box-shadow: var(--shadow-pop); border-radius: var(--r-md);
  overflow: hidden;
  animation: cmdin var(--dur-moderate) var(--ease-spring);
}
@keyframes cmdin { from { transform: translateY(-8px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
.dp-cmd-in { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: var(--bd); }
.dp-cmd-in input {
  flex: 1; border: none; outline: none;
  font: inherit; font-size: var(--fs-14); color: var(--text);
  background: transparent;
}
.dp-cmd-in input::placeholder { color: var(--text-3); }
.dp-cmd-in kbd {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  border: var(--bd); padding: 1px 5px; border-radius: var(--r-sm); background: var(--g-100);
}
.dp-cmd-list { max-height: 360px; overflow-y: auto; padding: 6px 0; }
.dp-cmd-group {
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); padding: 8px 14px 4px; font-weight: 600;
}
.dp-cmd-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; font-size: var(--fs-13); color: var(--text);
  background: transparent; border: none; text-align: left; width: 100%;
  font: inherit; cursor: pointer;
}
.dp-cmd-item:hover, .dp-cmd-item.on { background: var(--navy); color: #fff; }
.dp-cmd-item:hover .shortcut, .dp-cmd-item.on .shortcut { color: rgba(255,255,255,0.75); }
.dp-cmd-item .shortcut { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
.dp-cmd-empty { padding: 40px 14px; text-align: center; color: var(--text-3); font-size: var(--fs-12); }

/* Modal — centered dialog in the MAIN column (sidebar stays interactive).
   [CASE STUDY 2026-04-24 — backdrop offset by --side-w]
   Previous iteration used `inset: 0` which covered the sidebar too, shrinking
   the usable area and making the modal visually drift bottom-left on wide
   monitors. Pinning left: var(--side-w) re-centers inside the main column. */
.dp-modal-backdrop {
  position: fixed;
  top: 0; right: 0; bottom: 0; left: var(--side-w);
  background: rgba(17,24,39,0.45);
  z-index: 150; animation: fadein var(--dur-swift);
  display: grid; place-items: center;
  padding: 24px;
  overflow: hidden;
}
@media (max-width: 820px) {
  .dp-modal-backdrop { left: 0; padding: 12px; }
}
.dp-modal {
  position: relative;
  width: 820px; max-width: calc(100% - 0px); max-height: calc(100% - 0px);
  background: var(--surface); border: var(--bd); border-radius: var(--r-md);
  box-shadow: var(--shadow-pop);
  display: flex; flex-direction: column;
  animation: modalin var(--dur-reveal) var(--ease-decel);
  z-index: 151;
  overflow: hidden;
}
/* Wide variant — fills main column (minus sidebar and a 24px safety gap).
   Used for post viewers, post editors, preset editor grids. */
.dp-modal.dp-modal-wide {
  width: 100%;
  max-width: 1200px;
  height: 100%;
  max-height: 100%;
}
@media (min-width: 1400px) {
  .dp-modal.dp-modal-wide { max-width: 1280px; }
}
@keyframes modalin { from { transform: translateY(8px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
.dp-modal-head {
  padding: 12px 20px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: var(--bd);
}
.dp-modal-head h2 { margin: 0; font-size: var(--fs-16); font-weight: 600; }
.dp-modal-body { padding: 20px; overflow-y: auto; flex: 1; font-size: var(--fs-14); line-height: 1.6; }
.dp-modal-body h1, .dp-modal-body h2, .dp-modal-body h3 { margin-top: 1em; margin-bottom: 0.4em; font-weight: 600; letter-spacing: -0.005em; }
.dp-modal-body h2 { font-size: var(--fs-16); }
.dp-modal-body h3 { font-size: var(--fs-14); color: var(--text-2); }
.dp-modal-body p { margin: 0 0 10px; }
.dp-modal-body ul, .dp-modal-body ol { padding-left: 20px; margin: 0 0 10px; }
.dp-modal-body blockquote { border-left: 2px solid var(--g-300); padding: 4px 12px; color: var(--text-2); margin: 8px 0; background: var(--g-050); }
.dp-modal-body code { font-family: var(--font-mono); font-size: var(--fs-12); background: var(--g-100); padding: 1px 5px; border-radius: var(--r-sm); }
.dp-modal-body pre { background: var(--g-900); color: var(--g-100); padding: 12px 16px; border-radius: var(--r-sm); overflow-x: auto; font-family: var(--font-mono); font-size: var(--fs-12); }
.dp-modal-body pre code { background: transparent; padding: 0; color: inherit; }
.dp-modal-body table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: var(--fs-13); }
.dp-modal-body table th, .dp-modal-body table td { border: var(--bd); padding: 6px 10px; text-align: left; }
.dp-modal-body table th { background: var(--g-100); font-weight: 600; }
.dp-modal-foot {
  padding: 10px 20px;
  border-top: var(--bd); background: var(--g-050);
  display: flex; justify-content: flex-end; gap: 8px;
}

/* Post viewer body — tighter leading + more generous padding than the default
   modal body because post content often runs long and mixes images/tables. */
.dp-modal-body.dp-post-view {
  padding: 24px 32px;
  line-height: 1.7;
}
.dp-modal-body.dp-post-view img { max-width: 100%; border-radius: var(--r-sm); }
.dp-modal-body.dp-post-view h2 { font-size: var(--fs-18); margin-top: 1.2em; }
.dp-modal-body.dp-post-view h3 { font-size: var(--fs-15); margin-top: 1em; }
.dp-post-meta-bar {
  font-size: var(--fs-12); color: var(--text-3);
  margin: 0 0 18px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding-bottom: 12px; border-bottom: var(--bd);
}

/* Pinned post — table row + announcement item.
   Uses an inset left stripe instead of a full row tint so it layers CLEANLY
   on top of approval status backgrounds (approved/pending/rejected). A pinned
   minute in "pending" approval therefore reads as yellow-tinted with a navy
   stripe on the left, not a navy tint that hides the approval signal. */
.dp-table tbody tr.dp-row-pinned {
  box-shadow: inset 3px 0 0 var(--navy-600);
}
/* `--accent` is a theme-aware emphasis color — navy in light, navy-600 in
   dark — so pinned titles stay readable on the dark surface. Hardcoding
   var(--navy) blended into the dark background. */
.dp-table tbody tr.dp-row-pinned td:first-child { font-weight: 600; color: var(--accent); }
.dp-post-item.dp-post-pinned {
  background: var(--info-bg);
  box-shadow: inset 3px 0 0 var(--navy-600);
}
.dp-post-item.dp-post-pinned .t { color: var(--accent); font-weight: 600; }
.dp-post-item.dp-post-pinned:hover { background: var(--info-bg); filter: brightness(0.96); }
.dp-badge-notice {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 1px 7px 1px 6px;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: #fff; background: var(--navy); border-radius: var(--r-sm);
  margin-right: 8px; flex-shrink: 0;
}
.dp-badge-notice::before {
  content: ""; width: 8px; height: 8px; display: inline-block;
  background-color: currentColor;
  -webkit-mask: url('/img/dreampath/icons/scroll.svg') center/8px 8px no-repeat;
          mask: url('/img/dreampath/icons/scroll.svg') center/8px 8px no-repeat;
}

/* Tab strip — Dev Rules (MD | Design Guide) */
.dp-tabs {
  display: flex; gap: 0;
  border-bottom: var(--bd);
  margin-bottom: var(--s-5);
}
.dp-tab {
  display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
  padding: 10px 18px;
  background: transparent; border: none;
  color: var(--text-2); font: inherit; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color var(--dur-swift), border-color var(--dur-swift), background var(--dur-swift);
}
.dp-tab:hover { background: var(--g-100); color: var(--text); }
.dp-tab.dp-tab-on { color: var(--accent); border-bottom-color: var(--accent); }
.dp-tab .dp-tab-t { font-size: var(--fs-13); font-weight: 600; letter-spacing: -0.005em; }
.dp-tab .dp-tab-s { font-size: var(--fs-11); color: var(--text-3); }
.dp-tab.dp-tab-on .dp-tab-s { color: var(--navy-600); }

/* Design Guide swatches + token grid */
.dp-sw-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin: 8px 0 4px;
}
.dp-sw {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 10px;
  border: var(--bd); border-radius: var(--r-sm);
  background: var(--surface);
}
.dp-sw-chip {
  width: 40px; height: 40px;
  display: grid; place-items: center;
  border: 1px solid rgba(0,0,0,0.08); border-radius: var(--r-sm);
  font-size: var(--fs-13); font-weight: 600;
  flex-shrink: 0;
  position: relative; overflow: hidden;
}
.dp-sw.dp-sw-edit { border-color: var(--navy-600); box-shadow: 0 0 0 1px var(--navy-600); }
.dp-sw.dp-sw-edit .dp-sw-chip { cursor: pointer; }
.dp-sw-picker {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  opacity: 0;
  cursor: pointer;
  border: none; padding: 0; background: transparent;
}
.dp-sw-meta { min-width: 0; }
.dp-sw-name { font-size: var(--fs-12); font-weight: 600; color: var(--text); }
.dp-sw-var { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
.dp-token-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 6px;
}
.dp-token-row {
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  padding: 6px 10px;
  background: var(--g-050); border: var(--bd); border-radius: var(--r-sm);
  font-size: var(--fs-12);
}
.dp-token-k { font-family: var(--font-mono); color: var(--accent); }
.dp-token-v { color: var(--text-3); }

/* Account avatar — circular viewport with drag-to-reposition */
.dp-acct-avatar-col { text-align: center; }
.dp-acct-avatar {
  width: 200px; height: 200px;
  border-radius: 50%; overflow: hidden;
  background: var(--navy); color: #fff;
  display: grid; place-items: center;
  margin: 0 auto;
  border: 2px solid var(--g-200);
  position: relative;
}

/* Avatar crop modal — 1:1 canvas viewport with pan + zoom, circular mask */
.dp-crop-wrap { display: flex; flex-direction: column; gap: 14px; align-items: center; }
.dp-crop-box {
  width: 320px; height: 320px;
  border: 1px solid var(--g-300); border-radius: var(--r-sm);
  background: #111827;
  overflow: hidden;
  position: relative;
}
.dp-crop-box::after {
  content: ""; position: absolute; inset: 0;
  border-radius: 50%;
  box-shadow: 0 0 0 9999px rgba(17,24,39,0.55);
  pointer-events: none;
}
.dp-crop-box canvas { display: block; width: 100%; height: 100%; }
.dp-crop-ctrls {
  display: flex; align-items: center; gap: 10px;
  width: 320px;
}
.dp-crop-ctrls input[type="range"] { flex: 1; accent-color: var(--navy-600); }
.dp-crop-ctrls input[type="range"]:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--r-sm); }

/* Form field */
.dp-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
.dp-field label {
  font-size: var(--fs-12); color: var(--text-2); font-weight: 500;
  letter-spacing: 0.02em;
}
.dp-input, .dp-select, .dp-textarea {
  height: var(--row-default); padding: 0 10px;
  border: 1px solid var(--g-300); border-radius: var(--r-sm);
  background: var(--surface); color: var(--text); font: inherit; font-size: var(--fs-13);
}
.dp-textarea { min-height: 120px; padding: 8px 10px; resize: vertical; }
.dp-input:focus, .dp-select:focus, .dp-textarea:focus {
  outline: none; border-color: var(--navy-600); box-shadow: 0 0 0 1px var(--navy-600);
}

/* Empty state */
.dp-empty { padding: 40px 24px; text-align: center; background: var(--surface); border: var(--bd); }
.dp-empty .mark {
  width: 48px; height: 48px; margin: 0 auto 12px;
  border: 1px dashed var(--g-300);
  /* Theme-aware emphasis so the icon remains visible under both themes;
     var(--navy) was invisible on dark panel bg. */
  display: grid; place-items: center; color: var(--accent); border-radius: var(--r-sm);
}
.dp-empty .mark .ico {
  width: 20px; height: 20px; background-color: currentColor;
  -webkit-mask-size: 20px 20px; mask-size: 20px 20px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  -webkit-mask-image: var(--dp-icon); mask-image: var(--dp-icon);
}
.dp-empty h4 { margin: 0 0 4px; font-size: var(--fs-14); font-weight: 600; color: var(--text); }
.dp-empty p { margin: 0 0 12px; font-size: var(--fs-13); color: var(--text-3); }

/* Login */
.dp-login {
  position: fixed; inset: 0;
  background: radial-gradient(circle at 30% 20%, var(--navy-600) 0%, var(--navy) 40%, #001830 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 24px; z-index: 60;
}
.dp-login-card {
  width: 360px; max-width: 90vw;
  background: var(--surface); border: var(--bd);
  padding: 28px 32px 24px;
}
.dp-login-card .brand {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.dp-login-card .brand img { width: 32px; height: 32px; }
.dp-login-card .brand h1 { margin: 0; font-size: var(--fs-16); font-weight: 700; letter-spacing: -0.005em; line-height: 1.1; }
.dp-login-card .brand span { font-size: 10px; color: var(--text-3); letter-spacing: 0.12em; text-transform: uppercase; display: block; margin-top: 3px; }
.dp-login-card p { font-size: var(--fs-12); color: var(--text-3); margin: 0 0 16px; }
.dp-login-card .dp-btn { width: 100%; justify-content: center; }

/* ====================================================================
   Dev Rules — content + right-side sticky TOC with scroll-spy
   ==================================================================== */
.dp-rules-layout {
  display: grid; grid-template-columns: minmax(0, 1fr) 260px;
  gap: var(--s-5); align-items: flex-start;
}
.dp-rules-body { min-width: 0; display: flex; flex-direction: column; gap: 14px; }
.dp-rules-card {
  background: var(--surface); border: var(--bd); border-radius: var(--r-md);
  padding: 22px 28px; font-size: var(--fs-13); line-height: 1.65;
  scroll-margin-top: 72px;
}
.dp-rules-card.dp-rules-intro { border-left: 3px solid var(--navy); }
.dp-rules-card h2 {
  font-size: var(--fs-16); font-weight: 700; letter-spacing: -0.005em;
  margin: 0 0 14px; padding: 0 0 10px; border-bottom: var(--bd);
  color: var(--text); scroll-margin-top: 72px;
}
.dp-rules-card h3 {
  font-size: var(--fs-14); color: var(--text-2); font-weight: 600;
  margin: 18px 0 8px; scroll-margin-top: 72px;
}
.dp-rules-card p { margin: 0 0 10px; }
.dp-rules-card ul, .dp-rules-card ol { padding-left: 22px; margin: 0 0 10px; }
.dp-rules-card code {
  font-family: var(--font-mono); background: var(--g-100);
  padding: 1px 5px; border-radius: var(--r-sm); font-size: var(--fs-12);
}
.dp-rules-card pre {
  background: var(--g-900); color: var(--g-100);
  padding: 12px 16px; border-radius: var(--r-sm);
  overflow-x: auto; font-family: var(--font-mono); font-size: var(--fs-12);
  line-height: 1.55;
}
.dp-rules-card pre code { background: transparent; padding: 0; color: inherit; }
.dp-rules-card table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: var(--fs-12); }
.dp-rules-card table th, .dp-rules-card table td { border: var(--bd); padding: 6px 10px; text-align: left; vertical-align: top; }
.dp-rules-card table th { background: var(--g-100); font-weight: 600; }
.dp-rules-card blockquote {
  border-left: 2px solid var(--g-300); background: var(--g-050);
  padding: 8px 14px; margin: 8px 0; color: var(--text-2); border-radius: 0 var(--r-sm) var(--r-sm) 0;
}
.dp-rules-toc {
  position: sticky; top: 64px;
  padding: 16px 18px;
  background: var(--surface); border: var(--bd);
  max-height: calc(100vh - 80px); overflow-y: auto;
  font-size: var(--fs-12);
}
.dp-rules-toc .dp-h2 { margin: 0 0 10px; padding-bottom: 8px; border-bottom: var(--bd); }
.dp-toc-item {
  display: block; padding: 5px 10px 5px 12px;
  color: var(--text-2); text-decoration: none;
  border-left: 2px solid transparent;
  line-height: 1.35;
  transition: color var(--dur-instant), border-color var(--dur-instant), background var(--dur-instant);
}
.dp-toc-item:hover { color: var(--text); text-decoration: none; background: var(--g-100); }
.dp-toc-item.dp-toc-h3 { padding-left: 24px; font-size: 11px; color: var(--text-3); }
.dp-toc-item.dp-toc-active {
  color: var(--accent); font-weight: 600;
  border-left-color: var(--accent);
  background: var(--info-bg);
}
@media (max-width: 1100px) {
  .dp-rules-layout { grid-template-columns: 1fr; }
  .dp-rules-toc { position: static; max-height: 280px; }
}

/* ====================================================================
   Search modal — triggered from topbar input
   ==================================================================== */
.dp-search-modal .dp-modal-body { padding: 0; max-height: 70vh; overflow: hidden; }
.dp-search-input-row {
  padding: 14px 18px; border-bottom: var(--bd);
  display: flex; align-items: center; gap: 10px;
}
.dp-search-input-row input {
  flex: 1; border: none; outline: none;
  font: inherit; font-size: var(--fs-15); color: var(--text);
  background: transparent;
}
.dp-search-results { padding: 12px 0; max-height: 56vh; overflow-y: auto; }
.dp-search-group { margin-bottom: 10px; }
.dp-search-group-label {
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); padding: 8px 18px 4px; font-weight: 600;
}
.dp-search-hit {
  display: grid; grid-template-columns: 80px 1fr 140px;
  gap: 10px; padding: 8px 18px;
  cursor: pointer;
  border: none; background: transparent; width: 100%; text-align: left;
  font: inherit; align-items: center;
}
.dp-search-hit:hover { background: var(--g-100); }
.dp-search-hit .kind { font-size: 10px; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; }
.dp-search-hit .body { min-width: 0; }
.dp-search-hit .body .title { font-size: var(--fs-13); font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dp-search-hit .body .meta { font-size: 11px; color: var(--text-3); }
.dp-search-hit .meta-ts { font-family: var(--font-mono); color: var(--text-3); font-size: 11px; text-align: right; }

/* ====================================================================
   Calendar month grid
   ==================================================================== */
.dp-cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 0;
  background: var(--g-200);
  border: var(--bd);
}
.dp-cal-head { border: none; background: transparent; }
.dp-cal-wdh {
  padding: 8px 10px; background: var(--g-100);
  font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-2); font-weight: 600; border: var(--bd); border-top: none;
}
.dp-cal-day {
  background: var(--surface); min-height: 110px;
  padding: 6px 8px;
  display: flex; flex-direction: column; gap: 3px;
  cursor: pointer;
  transition: background var(--dur-instant);
}
.dp-cal-day:hover { background: var(--g-050); }
.dp-cal-day--empty { background: var(--g-100); cursor: default; }
.dp-cal-day--empty:hover { background: var(--g-100); }
.dp-cal-day--today { background: var(--info-bg); }
/* Today hover uses filter so the tone stays consistent across themes —
   #DDE9F5 was a light-only literal invisible in dark. */
.dp-cal-day--today:hover { background: var(--info-bg); filter: brightness(1.05); }
.dp-cal-day--has .dp-cal-dnum { color: var(--navy-600); font-weight: 600; }
.dp-cal-dnum { font-size: var(--fs-12); color: var(--text-2); font-weight: 500; font-family: var(--font-mono); }
.dp-cal-day--today .dp-cal-dnum {
  color: #fff; background: var(--navy-600);
  width: 20px; height: 20px; display: inline-grid; place-items: center;
  border-radius: 50%; font-size: 10px;
}
.dp-cal-ev {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 4px;
  font-size: 11px; color: var(--text);
  border-left: 2px solid var(--dv-2); background: var(--g-050);
  border-radius: var(--r-sm);
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.dp-cal-ev .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
.dp-cal-ev .name { overflow: hidden; text-overflow: ellipsis; }
.dp-cal-ev:hover { background: var(--info-bg); }
.dp-cal-more { font-size: 10px; color: var(--text-3); padding-left: 4px; }

/* ====================================================================
   Tiptap editor — ported from production /dreampath styling,
   retuned to ERP tokens (2px radius, flat borders, Inter body)
   ==================================================================== */
.dp-te-wrapper { position: relative; }
.dp-te-toolbar {
  display: flex; flex-wrap: wrap; gap: 2px;
  padding: 4px 6px;
  background: var(--g-050);
  border: var(--bd); border-bottom: none;
  border-top-left-radius: var(--r-sm);
  border-top-right-radius: var(--r-sm);
}
.dp-te-btn {
  width: 28px; height: 28px; display: grid; place-items: center;
  background: transparent; border: 1px solid transparent; border-radius: var(--r-sm);
  color: var(--text-2); cursor: pointer;
  font: inherit; font-size: 13px; font-weight: 500;
  padding: 0;
}
.dp-te-btn:hover { background: var(--g-100); color: var(--text); }
.dp-te-btn.is-active { background: var(--navy); color: #fff; border-color: var(--navy); }
.dp-te-btn .ico {
  width: 14px; height: 14px; background-color: currentColor;
  -webkit-mask-size: 14px 14px; mask-size: 14px 14px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  -webkit-mask-image: var(--dp-icon); mask-image: var(--dp-icon);
}
.dp-te-sep { width: 1px; background: var(--g-300); margin: 2px 4px; }
.dp-te-editor {
  border: var(--bd);
  border-radius: 0 0 var(--r-sm) var(--r-sm);
  min-height: 220px; max-height: 55vh; overflow-y: auto;
  padding: 14px 16px;
  font-size: var(--fs-14); line-height: 1.65;
  background: var(--surface);
}
.dp-te-editor:focus-within { border-color: var(--navy-600); box-shadow: 0 0 0 1px var(--navy-600); }
.dp-te-editor .ProseMirror { outline: none; min-height: 190px; }
.dp-te-editor:focus-within { box-shadow: var(--focus-ring); border-radius: var(--r-sm); }
.dp-te-editor .ProseMirror p { margin: 0 0 8px; }
.dp-te-editor .ProseMirror h2 { font-size: var(--fs-18); font-weight: 600; margin: 14px 0 8px; }
.dp-te-editor .ProseMirror h3 { font-size: var(--fs-16); font-weight: 600; margin: 12px 0 6px; color: var(--text-2); }
.dp-te-editor .ProseMirror ul, .dp-te-editor .ProseMirror ol { padding-left: 22px; margin: 0 0 8px; }
.dp-te-editor .ProseMirror blockquote { border-left: 2px solid var(--g-300); padding: 4px 12px; color: var(--text-2); margin: 6px 0; }
.dp-te-editor .ProseMirror code { font-family: var(--font-mono); background: var(--g-100); padding: 1px 4px; border-radius: var(--r-sm); font-size: var(--fs-12); }
.dp-te-editor .ProseMirror table { border-collapse: collapse; margin: 8px 0; }
.dp-te-editor .ProseMirror table th, .dp-te-editor .ProseMirror table td { border: var(--bd); padding: 6px 10px; min-width: 60px; }
.dp-te-editor .ProseMirror table th { background: var(--g-100); font-weight: 600; }
.dp-te-editor .ProseMirror img { max-width: 100%; height: auto; }
/* Extra Tiptap marks / nodes loaded post 2026-04-24 */
.dp-te-editor .ProseMirror mark, .dp-te-editor .ProseMirror [style*="background-color"] {
  background: color-mix(in srgb, var(--warn) 30%, transparent); padding: 0 2px;
}
.dp-te-editor .ProseMirror u { text-decoration: underline; }
.dp-te-editor .ProseMirror s { text-decoration: line-through; }
.dp-te-editor .ProseMirror pre {
  background: var(--g-900); color: var(--g-100);
  padding: 12px 14px; border-radius: var(--r-sm);
  font-family: var(--font-mono); font-size: var(--fs-12); line-height: 1.55;
  overflow-x: auto; margin: 10px 0;
}
.dp-te-editor .ProseMirror pre code { background: transparent; color: inherit; padding: 0; }
.dp-te-editor .ProseMirror hr {
  border: none; border-top: 1px solid var(--g-300); margin: 16px 0;
}
.dp-te-editor .ProseMirror a {
  color: var(--accent); text-decoration: underline;
}
.dp-te-editor .ProseMirror ul[data-type="taskList"] {
  list-style: none; padding-left: 4px;
}
.dp-te-editor .ProseMirror ul[data-type="taskList"] li {
  display: flex; align-items: flex-start; gap: 8px;
  margin: 2px 0;
}
.dp-te-editor .ProseMirror ul[data-type="taskList"] li > label {
  flex-shrink: 0; user-select: none; margin-top: 3px;
}
.dp-te-editor .ProseMirror ul[data-type="taskList"] li > div { flex: 1; min-width: 0; }
.dp-te-editor .ProseMirror p.is-editor-empty:first-child::before {
  color: var(--text-3); content: attr(data-placeholder);
  float: left; height: 0; pointer-events: none;
}

/* Drag-to-resize on the editor wrapper. Using native CSS `resize: vertical`
   on the editor pane so the whole wrapper (toolbar + editor) expands with
   the handle. Resize persists during this session; a reload restores the
   default. */
.dp-te-wrapper.dp-te-resize .dp-te-editor {
  resize: vertical;
  overflow-y: auto;
  min-height: 220px;
  max-height: 70vh;
}
/* Visual grip at the bottom-right of the editor (browser native ::-webkit-resizer
   is tiny and hard to spot). This handle overlays it so the UX is discoverable. */
.dp-te-handle {
  height: 10px;
  margin: 0;
  background:
    linear-gradient(180deg, transparent 4px, var(--g-300) 4px, var(--g-300) 5px, transparent 5px),
    var(--surface-2);
  border: var(--bd); border-top: none;
  border-radius: 0 0 var(--r-sm) var(--r-sm);
  cursor: ns-resize;
  display: grid; place-items: center;
  color: var(--text-3); font-size: 10px;
  pointer-events: none;   /* the real resize is the native :resize on editor */
}
.dp-te-handle::after { content: "⋯"; letter-spacing: 2px; }

/* File picker + list */
.dp-file-picker {
  display: flex; gap: 8px; align-items: center;
  margin-top: 12px;
}
.dp-file-picker .hint { font-size: 11px; color: var(--text-3); }
.dp-file-list {
  margin-top: 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.dp-file-item {
  display: grid; grid-template-columns: auto 1fr auto auto;
  gap: 10px; align-items: center;
  padding: 6px 10px;
  border: var(--bd); border-radius: var(--r-sm);
  background: var(--g-050);
  font-size: var(--fs-12);
}
.dp-file-item .name { color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dp-file-item .size { color: var(--text-3); font-family: var(--font-mono); }
.dp-file-item .state { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }
.dp-file-item .state.ok { color: var(--ok); }
.dp-file-item .state.err { color: var(--alert); }
.dp-file-item .rm {
  width: 22px; height: 22px; display: grid; place-items: center;
  background: transparent; border: none; border-radius: var(--r-sm);
  color: var(--text-3);
}
.dp-file-item .rm:hover { background: var(--g-150); color: var(--alert); }
.dp-file-item .rm .ico {
  width: 12px; height: 12px;
  background-color: currentColor;
  -webkit-mask: url('/img/dreampath/icons/x.svg') center/12px 12px no-repeat;
          mask: url('/img/dreampath/icons/x.svg') center/12px 12px no-repeat;
}

/* Post-not-found / error inline card in modal body */
.dp-inline-error {
  padding: 24px; text-align: center;
  border: 1px dashed var(--g-300); border-radius: var(--r-sm);
  background: var(--g-050); color: var(--text-2); font-size: var(--fs-13);
}
.dp-inline-error .icon {
  width: 32px; height: 32px; margin: 0 auto 8px;
  border: 1px dashed var(--g-300); border-radius: 50%;
  display: grid; place-items: center; color: var(--alert);
  background-color: currentColor;
  -webkit-mask: url('/img/dreampath/icons/x.svg') center/14px 14px no-repeat;
          mask: url('/img/dreampath/icons/x.svg') center/14px 14px no-repeat;
}

/* Toast */
.dp-toast-host {
  position: fixed; top: 16px; right: 16px; z-index: 300;
  display: flex; flex-direction: column; gap: 8px;
}
.dp-toast {
  /* Dark neutral surface works in both themes (was var(--text), which flips
     to white in dark → white-on-white toast bug). */
  background: #111827; color: #FFFFFF;
  padding: 10px 14px; font-size: var(--fs-13); border-radius: var(--r-sm);
  box-shadow: var(--shadow-pop);
  animation: tin var(--dur-moderate) var(--ease-decel);
}
.dp-toast.err { background: var(--alert); }
.dp-toast.ok  { background: var(--ok); }
@keyframes tin { from { transform: translateX(16px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }

/* Responsive */
@media (max-width: 1100px) {
  .dp-stat-strip { grid-template-columns: repeat(3, 1fr); }
  .dp-stat-strip > :nth-child(n+4) { border-top: var(--bd); }
  .dp-home { grid-template-columns: 1fr; }
}
@media (max-width: 820px) {
  .dp-app { grid-template-columns: 1fr; }
  .dp-side { position: fixed; left: -240px; top: 0; width: 232px; z-index: 40; transition: left var(--dur-reveal) var(--ease-decel); }
  .dp-side.open { left: 0; }
  .dp-mob-menu { display: inline-grid !important; }
  .dp-search { display: none; }
  .dp-switcher { display: none; }
  .dp-page { padding: 16px; }
  .dp-input, .dp-select, .dp-textarea { font-size: 16px; }
}
@media (max-width: 520px) {
  .dp-stat-strip { grid-template-columns: 1fr 1fr; }
  .dp-stat-strip > :nth-child(n+3) { border-top: var(--bd); }
  .dp-stat-strip > :nth-child(odd) { border-right: var(--bd); }
  .dp-stat-strip > :nth-child(even) { border-right: none; }
  .dp-modal-backdrop { padding: 0; align-items: stretch; }
  .dp-modal { width: 100vw; max-width: 100vw; max-height: 100vh; border-radius: 0; border: none; }
}

/* Print — ERP-grade */
@media print {
  body { background: var(--surface); font-family: Georgia, "Times New Roman", serif; }
  .dp-side, .dp-topbar, .dp-cmd-backdrop, .dp-modal-backdrop, .dp-signout { display: none !important; }
  .dp-app { display: block; }
  .dp-page { padding: 24px 28px; max-width: none; }
  .dp-thread { display: block !important; margin-bottom: 20px; }
  .dp-panel { border: 1px solid #000; page-break-inside: avoid; }
}

.dp-hidden { display: none !important; }

/* Floating back-to-top button — hidden until the page scrolls past 400px.
   Positioned bottom-right, above any modal/cmd backdrops only when they
   aren't open (z-index 40 sits below modal 150). */
.dp-top-fab {
  position: fixed; right: 20px; bottom: 20px;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: grid; place-items: center;
  border: none; cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  z-index: 40;
  opacity: 0; transform: translateY(8px); pointer-events: none;
  transition: opacity var(--dur-moderate), transform var(--dur-moderate);
}
.dp-top-fab.on { opacity: 1; transform: translateY(0); pointer-events: auto; }
.dp-top-fab:hover { filter: brightness(1.08); }
.dp-top-fab svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* Calendar: let the grid stretch vertically to fill the page. Without this
   every day cell stays at the 110px min-height and the page leaves empty
   whitespace below on tall viewports. */
.dp-cal-grid.dp-cal-grid--fill {
  grid-auto-rows: 1fr;
  min-height: calc(100vh - 240px);
}
.dp-cal-grid.dp-cal-grid--fill .dp-cal-day { min-height: 0; height: 100%; }
.dp-cal-grid.dp-cal-grid--fill .dp-cal-head { height: auto; }

/* Case Studies tab — grid of cards, one per in-code [CASE STUDY …] block.
   Fixed-height preview with pre-formatted body so comments remain legible. */
.dp-case-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
}
.dp-case-card {
  background: var(--surface);
  border: var(--bd); border-radius: var(--r-md);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.dp-case-card header { display: flex; flex-direction: column; gap: 2px; }
.dp-case-card .dp-case-title {
  font-size: var(--fs-13); color: var(--accent); font-weight: 600;
  line-height: 1.35;
}
.dp-case-card .dp-case-meta {
  font-size: 11px; color: var(--text-3); display: flex; gap: 8px; align-items: center;
}
.dp-case-card .dp-case-body {
  margin: 0; padding: 10px 12px;
  background: var(--surface-2);
  border: 1px solid var(--g-150); border-radius: var(--r-sm);
  font-family: var(--font-mono); font-size: var(--fs-11);
  color: var(--text-2); line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
  max-height: 260px; overflow-y: auto;
}

/* Per-board search + sort toolbar — sits between the tab bar and the post
   table. Three clusters: search box, field checkboxes, sort controls. */
.dp-board-toolbar {
  display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
  padding: 10px 12px;
  margin: 0 0 var(--gap-card);
  background: var(--surface);
  border: var(--bd); border-radius: var(--r-md);
}
.dp-board-search { display: flex; gap: 6px; flex: 1; min-width: 240px; }
.dp-board-search .dp-input-sm { flex: 1; }
.dp-input-sm, .dp-select-sm {
  height: var(--row-compact); padding: 0 10px;
  font-size: var(--fs-12);
  border: 1px solid var(--g-300); border-radius: var(--r-sm);
  background: var(--surface); color: var(--text);
}
.dp-input-sm:focus, .dp-select-sm:focus {
  outline: none; border-color: var(--navy-600); box-shadow: 0 0 0 1px var(--navy-600);
}
.dp-board-search-opts, .dp-board-sort {
  display: flex; gap: 10px; align-items: center;
  font-size: var(--fs-12); color: var(--text-2);
}
.dp-board-search-opts-label {
  font-size: 11px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
}
.dp-board-search-opts label {
  display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
}
.dp-board-search-opts input[type="checkbox"] { accent-color: var(--navy-600); }

/* Bulk-selection action bar — sits above the board table when at least one
   row is checked. Admin-only. Persists selection across pagination via
   state.bulkSelection keyed by (board, activeTab). */
.dp-bulkbar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 10px 14px;
  background: var(--info-bg);
  border-bottom: 1px solid var(--g-200);
  flex-wrap: wrap;
}
.dp-bulkbar-count { font-size: var(--fs-13); color: var(--text-2); }
.dp-bulkbar-count strong { color: var(--accent); margin-right: 4px; font-size: var(--fs-14); }
.dp-bulkbar-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.dp-row-check { accent-color: var(--navy-600); cursor: pointer; }

/* Hidden (blinded) post row — admin-only greyed style. Text desaturates so
   admins instantly see the post is suppressed for everyone else. Non-admins
   never see the row because the list query filters is_hidden=1 out. */
.dp-table tbody tr.dp-row-hidden {
  background: var(--g-100) !important;
  color: var(--text-3);
  opacity: 0.7;
}
.dp-table tbody tr.dp-row-hidden td:first-child { font-style: italic; }
.dp-table tbody tr.dp-row-hidden:hover { background: var(--g-150) !important; opacity: 0.85; }

/* Row-action buttons (Hide / Move) — ghost icons, visible on hover so they
   don't clutter the dense board table. Admin sees them on every row. */
.dp-row-action {
  min-width: 28px; padding: 0 6px; height: 26px;
  font-size: 14px; line-height: 1;
  opacity: 0.5;
  transition: opacity var(--dur-swift);
}
.dp-table tbody tr:hover .dp-row-action { opacity: 1; }
.dp-row-action:hover { background: var(--g-150); }

/* Draft-save confirmation — shown as an overlay on top of the post editor
   when the user clicks outside / hits Esc / clicks Cancel. Blocks further
   interaction with the underlying modal until the user picks an action. */
.dp-draft-prompt-wrap {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  background: rgba(17,24,39,0.55);
  z-index: 160;
}
.dp-draft-prompt {
  background: var(--surface);
  border: var(--bd); border-radius: var(--r-md);
  box-shadow: var(--shadow-pop);
  padding: 20px 24px; width: 380px; max-width: 90%;
}
.dp-draft-prompt h3 {
  margin: 0 0 6px; font-size: var(--fs-16); font-weight: 600; color: var(--text);
}
.dp-draft-prompt p { margin: 0 0 16px; color: var(--text-2); font-size: var(--fs-13); line-height: 1.55; }
.dp-draft-prompt-foot { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }

/* Notification badge on the bell icon */
.dp-notif-count {
  position: absolute; top: 2px; right: 2px;
  min-width: 16px; height: 16px; padding: 0 4px;
  border-radius: 8px;
  background: var(--alert); color: #fff;
  font-size: 10px; font-weight: 700; line-height: 16px;
  display: grid; place-items: center;
  border: 2px solid var(--surface);
}

/* Notification panel body (rendered inside the modal) */
.dp-notif-list { display: flex; flex-direction: column; max-height: 60vh; }
.dp-notif-row {
  display: flex; gap: 10px; align-items: center;
  padding: 12px 14px; text-align: left;
  background: transparent; border: none; border-bottom: 1px solid var(--g-150);
  font: inherit; cursor: pointer;
  transition: background var(--dur-swift);
}
.dp-notif-row:last-child { border-bottom: none; }
.dp-notif-row:hover { background: var(--g-100); }
.dp-notif-row.is-unread { background: var(--info-bg); }
.dp-notif-row.is-unread:hover { background: var(--info-bg); filter: brightness(0.97); }
.dp-notif-main { flex: 1; min-width: 0; }
.dp-notif-title { font-size: var(--fs-13); font-weight: 600; color: var(--text); margin-bottom: 2px; }
.dp-notif-body { font-size: var(--fs-12); color: var(--text-2); margin-bottom: 4px; }
.dp-notif-meta { font-size: 11px; color: var(--text-3); }
.dp-notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.dp-notif-empty { padding: 40px 20px; text-align: center; color: var(--text-3); font-size: var(--fs-12); }

/* Team board sub-tab bar — always visible for tab-supporting boards.
   "Default" pill is pinned first (never draggable / deletable); user tabs
   follow and are drag-reorderable by admin; a trailing "+" opens the
   new-tab editor. Drag feedback uses is-dragging / is-drop-target. */
.dp-board-tabs {
  display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
  margin: 0 0 var(--gap-section);
  padding: 4px;
  background: var(--surface-2);
  border: var(--bd); border-radius: var(--r-md);
  overflow-x: auto;
}
.dp-board-tab {
  padding: 6px 14px; min-height: 28px;
  background: transparent; color: var(--text-2);
  font: inherit; font-size: var(--fs-12); font-weight: 500;
  border: 1px solid transparent; border-radius: var(--r-sm);
  cursor: pointer; white-space: nowrap;
}
.dp-board-tab:hover { background: var(--surface); color: var(--text); }
.dp-board-tab.on {
  background: var(--surface); color: var(--accent);
  border-color: var(--g-200);
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}
.dp-board-tab-default { font-weight: 600; }

/* Wrapper around user tabs so we can attach drag events on the container
   and host the hover edit-icon overlay. */
.dp-board-tab-wrap {
  position: relative;
  display: inline-flex; align-items: center;
  border-radius: var(--r-sm);
  cursor: grab;
}
.dp-board-tab-wrap:active { cursor: grabbing; }
.dp-board-tab-wrap.is-dragging { opacity: 0.45; }
.dp-board-tab-wrap.is-drop-target {
  outline: 2px dashed var(--accent); outline-offset: 2px;
}
.dp-board-tab-edit {
  position: absolute; top: -6px; right: -6px;
  width: 18px; height: 18px; padding: 0;
  background: var(--surface); color: var(--text-2);
  border: 1px solid var(--g-300); border-radius: 50%;
  font-size: 12px; line-height: 14px;
  cursor: pointer;
  opacity: 0;
  transition: opacity var(--dur-swift);
}
.dp-board-tab-wrap:hover .dp-board-tab-edit { opacity: 1; }
.dp-board-tab-edit:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Inline "+" add button — matches tab height but uses accent color */
.dp-board-tab-add {
  color: var(--accent); font-weight: 700; font-size: var(--fs-14);
  border: 1px dashed var(--g-300); padding: 6px 14px; min-width: 36px;
}
.dp-board-tab-add:hover {
  background: var(--info-bg); border-color: var(--accent); border-style: solid;
}
.dp-board-tab-cap {
  padding: 6px 10px; font-family: var(--font-mono);
  font-size: 11px; color: var(--text-3);
  border: 1px dashed var(--g-300); border-radius: var(--r-sm);
}

/* Chip picker — "To:" field metaphor for user selection (approvers, future
   task owners). Input sits below the picked chips; a suggestion list opens
   below as the user types. Scales to arbitrary roster size. */
.dp-chip-picker {
  position: relative;
  display: flex; flex-direction: column; gap: 6px;
  padding: 8px; background: var(--surface);
  border: 1px solid var(--g-300); border-radius: var(--r-sm);
}
.dp-chip-picker:focus-within { border-color: var(--navy-600); box-shadow: 0 0 0 1px var(--navy-600); }
.dp-chip-picked {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.dp-chip-picked:empty { display: none; }
.dp-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 4px 2px 10px;
  background: var(--info-bg); color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 999px;
  font-size: var(--fs-12); font-weight: 500;
  max-width: 100%;
}
.dp-chip-x {
  width: 18px; height: 18px; padding: 0;
  border: none; background: transparent; color: inherit;
  font-size: 14px; line-height: 1;
  cursor: pointer; border-radius: 50%;
}
.dp-chip-x:hover { background: rgba(10,92,158,0.18); }
.dp-chip-input {
  border: none; outline: none; background: transparent;
  padding: 4px 6px; min-width: 160px;
  font: inherit; font-size: var(--fs-13); color: var(--text);
}
.dp-chip-suggest {
  position: absolute; left: 0; right: 0; top: 100%;
  margin-top: 4px; z-index: 5;
  background: var(--surface);
  border: var(--bd); border-radius: var(--r-sm);
  box-shadow: var(--shadow-pop);
  max-height: 220px; overflow-y: auto;
  display: none;
}
.dp-chip-suggest.on { display: block; }
.dp-chip-opt {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  width: 100%; text-align: left;
  padding: 8px 12px; font: inherit; font-size: var(--fs-13);
  background: transparent; border: none; color: var(--text);
  cursor: pointer;
}
.dp-chip-opt:hover,
.dp-chip-opt:focus-visible { background: var(--g-100); }
.dp-chip-opt-meta { color: var(--text-3); font-size: 11px; }
.dp-chip-empty { padding: 12px; color: var(--text-3); font-size: 12px; text-align: center; }

/* Multi-select check grid — used in Task editor Owners. Two columns on
   desktop, one on mobile. Each row is a clickable label wrapping an actual
   checkbox so keyboard/screen-reader access stays intact. */
.dp-check-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 4px;
  border: var(--bd); border-radius: var(--r-sm);
  padding: 8px; background: var(--surface-2);
  max-height: 200px; overflow-y: auto;
}
.dp-check-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px; font-size: var(--fs-12);
  cursor: pointer; border-radius: var(--r-sm);
}
.dp-check-row:hover { background: var(--g-150); }
.dp-check-row input[type="checkbox"] { accent-color: var(--navy-600); }

/* ====================================================================
   Gantt chart — Tasks → Gantt view
   Fixed-width timeline column scrolls horizontally so tasks can span
   up to 53 days without breaking layout. Header row has two strata:
   week labels (month/day) on top and day numbers below.
   ==================================================================== */
.dp-gantt-wrap {
  overflow-x: auto;
  background: var(--surface);
}
.dp-gantt-scroll {
  min-width: max-content;
}
.dp-gantt-hdr,
.dp-gantt-row {
  display: grid;
  grid-template-columns: 240px 1fr;
  align-items: stretch;
}
.dp-gantt-hdr {
  border-bottom: var(--bd);
  background: var(--g-100);
  font-size: 10px; color: var(--text-3);
  letter-spacing: 0.04em;
  position: sticky; top: 0; z-index: 2;
}
.dp-gantt-label-hdr { padding: 8px 12px; font-weight: 600; text-transform: uppercase; }
.dp-gantt-track-hdr {
  position: relative;
  display: flex; flex-direction: column;
  border-left: var(--bd);
}
.dp-gantt-weeks {
  display: flex;
  border-bottom: 1px solid var(--g-200);
  height: 22px;
}
.dp-gantt-wcol {
  padding: 3px 6px; font-weight: 600; color: var(--text-2);
  font-size: 11px;
  border-right: 1px solid var(--g-200);
}
.dp-gantt-days {
  display: flex;
  height: 22px;
}
.dp-gantt-dcol {
  display: grid; place-items: center;
  border-right: 1px solid var(--g-150);
  font-size: 10px; color: var(--text-3);
  flex-shrink: 0;
}
.dp-gantt-dcol.dp-gantt-weekend { background: var(--g-100); }
.dp-gantt-dcol.dp-gantt-today { background: var(--info-bg); color: var(--accent); font-weight: 700; }
.dp-gantt-row {
  border-bottom: 1px solid var(--g-150);
  min-height: 40px;
  cursor: pointer;
}
.dp-gantt-row:hover { background: var(--g-100); }
.dp-gantt-label {
  padding: 6px 12px; display: flex; flex-direction: column; justify-content: center;
  border-right: var(--bd);
}
.dp-gantt-title { font-size: var(--fs-13); font-weight: 500; color: var(--text); }
.dp-gantt-meta  { font-size: 10px; color: var(--text-3); margin-top: 2px; }
.dp-gantt-track {
  position: relative;
  height: 40px;
  background-image: linear-gradient(to right, var(--g-150) 1px, transparent 1px);
  background-size: 28px 100%;
}
.dp-gantt-bar {
  position: absolute; top: 10px; height: 20px;
  border-radius: var(--r-sm);
  display: flex; align-items: center;
  padding: 0 6px;
  font-size: 10px; font-weight: 500;
  overflow: hidden;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
}
.dp-gantt-bar-info    { background: var(--info); color: #fff; }
.dp-gantt-bar-ok      { background: var(--ok); color: #fff; }
.dp-gantt-bar-warn    { background: var(--warn); color: #fff; }
.dp-gantt-bar-alert   { background: var(--alert); color: #fff; }
.dp-gantt-bar-neutral { background: var(--g-400); color: var(--text); }
.dp-gantt-todayline {
  position: absolute; top: 0; bottom: 0;
  width: 2px; background: var(--alert);
  pointer-events: none; z-index: 1;
}

/* Numbered pagination (Activity log, eventually Versions too) */
.dp-pager {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; padding: 14px;
  border-top: var(--bd); background: var(--surface-2);
}
.dp-pager button {
  min-width: 32px; height: 32px; padding: 0 10px;
  font: inherit; font-size: 12px;
  background: var(--surface); color: var(--text-2);
  border: 1px solid var(--g-200); border-radius: var(--r-sm);
  cursor: pointer;
}
.dp-pager button:hover:not(:disabled) { background: var(--g-100); color: var(--text); }
.dp-pager button.on {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.dp-pager button:disabled { opacity: 0.4; cursor: default; }
.dp-pager .dp-pager-gap { color: var(--text-3); padding: 0 4px; }

</style>
</head>
<body>

<a class="dp-skip" href="#dp-main">Skip to main</a>

<div id="dp-root"></div>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

<!-- Tiptap loader — esm.sh allowed in CSP connect-src. Sets window.__DP_Tiptap
     and fires 'tiptap-ready' so _waitForTiptap(cb) can mount lazily.
     Loads every first-party free extension so the toolbar can expose the
     full free feature set (underline, link, code block, task list,
     text align, highlight, color, typography, horizontal rule, etc.). -->
<script type="module">
  try {
    const [
      { Editor },
      { default: StarterKit },
      { default: Underline },
      { default: Link },
      { default: Highlight },
      { default: TextAlign },
      { default: Subscript },
      { default: Superscript },
      { default: TaskList },
      { default: TaskItem },
      { default: HorizontalRule },
      { default: Color },
      { default: TextStyle },
      { default: Typography },
      { default: Placeholder },
      { default: CharacterCount },
      { default: Table },
      { default: TableRow },
      { default: TableHeader },
      { default: TableCell },
      { default: Image },
    ] = await Promise.all([
      import('https://esm.sh/@tiptap/core@2'),
      import('https://esm.sh/@tiptap/starter-kit@2'),
      import('https://esm.sh/@tiptap/extension-underline@2'),
      import('https://esm.sh/@tiptap/extension-link@2'),
      import('https://esm.sh/@tiptap/extension-highlight@2'),
      import('https://esm.sh/@tiptap/extension-text-align@2'),
      import('https://esm.sh/@tiptap/extension-subscript@2'),
      import('https://esm.sh/@tiptap/extension-superscript@2'),
      import('https://esm.sh/@tiptap/extension-task-list@2'),
      import('https://esm.sh/@tiptap/extension-task-item@2'),
      import('https://esm.sh/@tiptap/extension-horizontal-rule@2'),
      import('https://esm.sh/@tiptap/extension-color@2'),
      import('https://esm.sh/@tiptap/extension-text-style@2'),
      import('https://esm.sh/@tiptap/extension-typography@2'),
      import('https://esm.sh/@tiptap/extension-placeholder@2'),
      import('https://esm.sh/@tiptap/extension-character-count@2'),
      import('https://esm.sh/@tiptap/extension-table@2'),
      import('https://esm.sh/@tiptap/extension-table-row@2'),
      import('https://esm.sh/@tiptap/extension-table-header@2'),
      import('https://esm.sh/@tiptap/extension-table-cell@2'),
      import('https://esm.sh/@tiptap/extension-image@2'),
    ]);
    window.__DP_Tiptap = {
      Editor, StarterKit,
      Underline, Link, Highlight, TextAlign, Subscript, Superscript,
      TaskList, TaskItem, HorizontalRule,
      Color, TextStyle, Typography, Placeholder, CharacterCount,
      Table, TableRow, TableHeader, TableCell, Image,
    };
    window.dispatchEvent(new CustomEvent('tiptap-ready'));
  } catch (e) {
    console.warn('[Dreampath v2] Tiptap failed to load:', e);
  }
</script>

<!--
  [CASE STUDY — v2 cache-bust depends on ?v= changing between deploys]
  ./deploy.sh --skip-version leaves dp_versions unchanged, so ?v= is rewritten
  to the SAME value and the browser never refetches. To ship v2 edits quickly,
  prefer ./deploy.sh fix (bumps cc). Ref: DREAMPATH-HISTORY.md 2026-04-24 · G.
-->
