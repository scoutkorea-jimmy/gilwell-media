    .privacy-wrap p, .privacy-wrap li { font-size: 14px; line-height: 1.75; color: #2a2a2a; word-break: keep-all; }
    .privacy-wrap ul { padding-left: 20px; margin: 6px 0 12px; }
    .privacy-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 10px 0 18px; }

    .privacy-wrap code { font-family: ui-monospace, Menlo, monospace; background: #f5f5f7; padding: 1px 5px; border-radius: 3px; font-size: 12px; }

  <main id="main-content" class="privacy-wrap">
    <div id="privacy-updated-meta" class="privacy-sub" hidden></div>
    <div id="privacy-body" class="privacy-body">
      <p class="privacy-sub">불러오는 중…</p>
    </div>
  </main>
  <script>
    (function () {
      var host = document.getElementById('privacy-body');
      var meta = document.getElementById('privacy-updated-meta');
      function render(html, updatedAt) {
        if (!host) return;
        var clean = (window.DOMPurify && DOMPurify.sanitize)
          ? DOMPurify.sanitize(html, { USE_PROFILES: { html: true } })
          : html;
        host.innerHTML = clean;
        if (meta && updatedAt) {
          try {
            var d = new Date(updatedAt);
            if (!isNaN(d.getTime())) {
              meta.textContent = '최종 개정 ' + d.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit' });
              meta.hidden = false;
            }
          } catch (_) {}
        }
      }
      fetch('/api/settings/privacy-policy', { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data && data.html) render(data.html, data.updated_at);
          else host.innerHTML = '<p class="privacy-sub">방침 본문을 불러올 수 없습니다.</p>';
        })
        .catch(function () {
          host.innerHTML = '<p class="privacy-sub">방침 본문을 불러올 수 없습니다.</p>';
        });
    })();
  </script>
