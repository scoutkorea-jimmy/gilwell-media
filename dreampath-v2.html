<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#002D56">
<title>DreamPath PMO</title>

<!-- Favicon / icons -->
<link rel="icon" type="image/svg+xml" href="/img/dreampath-v2/favicon.svg">
<link rel="apple-touch-icon" href="/img/dreampath-v2/logo-mark.svg">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

<!-- [CASE STUDY 2026-04-24 — CSS inline single-source] -->
<!-- 증상: 외부 style.css 추가 시 FOUC + nonce 환경에서 로드 거부 가능. -->
<!-- 원인: dreampath.html 은 /dreampath legacy 경로. strict-dynamic CSP 하에서는 -->
<!--       style-src 도 nonce 필요. 외부 css 는 관리 부담만 늘림. -->
<!-- 교훈: 모든 CSS 는 이 <style> 블록에 유지. 외부 .css 파일 금지. -->
<!-- 참고: DREAMPATH.md §3.1. -->
<style>
/* =================================================================
   DreamPath — single-source stylesheet
   Specified by DREAMPATH.md Section 3 (inline-CSS contract).
   This file is the one and only external stylesheet for deployment.
   ================================================================= */

/* ---------- Tokens (Section 3.2) ---------- */
:root {
  /* Brand (CUFS) */
  --sidebar-bg:  #002D56;   /* CUFS Navy */
  --accent:      #146E7A;   /* CUFS Green */
  --accent-mid:  #1A9BAA;   /* lighter teal */
  --gold:        #8D714E;   /* CUFS Gold */

  /* Neutrals (BP media) */
  --gray-900: #030303;
  --gray-800: #1B1B1B;
  --gray-700: #3F3F3F;
  --gray-500: #6B7B85;
  --gray-300: #C4C4C4;
  --gray-100: #EBEBEB;
  --gray-50:  #F5F6F7;
  --white:    #FFFFFF;

  /* Semantic */
  --bg:        #F5F6F7;
  --bg-tint:   #EBEBEB;
  --surface:   #FFFFFF;
  --surface-2: #F9FAFB;
  --line:      #E4E6E8;
  --line-2:    #EEF0F2;

  /* Text */
  --text:   #030303;     /* Lc 107.7 */
  --text-2: #3F3F3F;     /* Lc 96.2 */
  --text-3: #5A6B77;     /* Lc ~65 — meta (see A1 rule) */

  /* State */
  --alert:  #B3261E;
  --warn:   #8D5B16;
  --ok:     #1F7A3A;
  --info:   var(--accent);

  /* Focus + touch (A1/A2/A5 + Section 14 touch-min) */
  --touch-min:  44px;
  --focus-ring: 0 0 0 3px rgba(26,155,170,0.35);

  /* Type */
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', Roboto, sans-serif;
  --font-en:   'Inter', -apple-system, system-ui, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, monospace;

  /* Radii + shadows */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;
  --shadow-1: 0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
  --shadow-2: 0 4px 16px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.04);
}

* , *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; }

/* A4 — skip link */
.dp-skip-link {
  position: absolute; left: 0; top: -40px;
  background: var(--sidebar-bg); color: #fff;
  padding: 10px 16px; z-index: 999;
  font-weight: 600; font-size: 13px;
  border-bottom-right-radius: 8px;
}
.dp-skip-link:focus { top: 0; }

/* A5 — focus ring (global) */
:focus-visible { outline: 2px solid var(--accent-mid); outline-offset: 2px; box-shadow: var(--focus-ring); }
:focus:not(:focus-visible) { outline: none; }

/* =================================================================
   SHELL — sidebar + main
   ================================================================= */
.dp-app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

.dp-sidebar {
  background: var(--sidebar-bg);
  color: rgba(255,255,255,0.9);
  position: sticky; top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex; flex-direction: column;
}

.dp-side-brand {
  display: flex; align-items: center; gap: 12px;
  padding: 22px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.dp-side-brand img { width: 36px; height: 36px; }
.dp-side-brand .wm { display: flex; flex-direction: column; line-height: 1.15; }
.dp-side-brand .wm strong { font-family: var(--font-en); font-weight: 700; font-size: 16px; letter-spacing: -0.01em; color: #fff; }
.dp-side-brand .wm span { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; text-transform: uppercase; }

.dp-side-nav { padding: 14px 12px; flex: 1; }
.dp-side-nav h3 {
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.42);
  margin: 16px 10px 8px; font-weight: 700;
}

.dp-nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  color: rgba(255,255,255,0.82);
  font-size: 14px;
  margin-bottom: 1px;
  cursor: pointer;
  min-height: var(--touch-min);
  background: none; border: none; width: 100%; text-align: left;
  font-family: inherit;
}
.dp-nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.dp-nav-item[aria-current="page"] { background: rgba(20,110,122,0.35); color: #fff; font-weight: 600; }
.dp-nav-item[aria-current="page"] .dp-nav-icon-svg { background-color: #FFE600; }
.dp-nav-item .badge { margin-left: auto; background: #B3261E; color: #fff; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px; min-width: 18px; text-align: center; }

/* 14.3 — CSS mask icons (currentColor inherit) */
.dp-nav-icon-svg {
  display: inline-block;
  width: 20px; height: 20px;
  background-color: currentColor;
  -webkit-mask-image: var(--dp-icon);
          mask-image: var(--dp-icon);
  -webkit-mask-size: 20px 20px;
          mask-size: 20px 20px;
  -webkit-mask-repeat: no-repeat;
          mask-repeat: no-repeat;
  -webkit-mask-position: center;
          mask-position: center;
  flex-shrink: 0;
}

.dp-side-foot {
  padding: 14px 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.dp-session {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 8px 12px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: rgba(255,255,255,0.65);
  margin-bottom: 10px;
}
.dp-session strong { color: #FFE600; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.02em; }
.dp-user { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
.dp-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 13px; }
.dp-user .who { font-size: 13px; color: #fff; font-weight: 600; }
.dp-user .role { font-size: 11px; color: rgba(255,255,255,0.52); }
.dp-signout {
  width: 100%;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.82);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 9px; border-radius: 8px; font-size: 12px; font-weight: 600;
}
.dp-signout:hover { background: rgba(179,38,30,0.2); color: #fff; border-color: rgba(179,38,30,0.45); }

/* =================================================================
   MAIN: topbar + page
   ================================================================= */
.dp-main { display: flex; flex-direction: column; min-width: 0; }
.dp-topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  padding: 12px 28px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 20px;
  position: sticky; top: 0; z-index: 10;
  min-height: 56px;
}
.dp-crumbs { font-size: 13px; color: var(--text-3); display: flex; align-items: center; gap: 8px; }
.dp-crumbs strong { color: var(--text); font-weight: 600; }
.dp-crumbs .sep { color: var(--gray-300); }

.dp-search { flex: 1; max-width: 520px; position: relative; }
.dp-search .dp-input {
  width: 100%; padding: 9px 12px 9px 38px;
  border: 1px solid var(--line);
  border-radius: 10px; font: inherit;
  background: var(--surface-2);
  min-height: var(--touch-min);
}
.dp-search .dp-input:focus { border-color: var(--accent); background: #fff; }
.dp-search .dp-search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px;
  background-color: var(--text-3);
  -webkit-mask-image: var(--dp-icon); mask-image: var(--dp-icon);
  -webkit-mask-size: 18px 18px; mask-size: 18px 18px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
}

.dp-top-actions { display: flex; gap: 8px; align-items: center; }
.dp-iconbtn {
  width: 40px; height: 40px;
  display: grid; place-items: center;
  border-radius: 8px; border: 1px solid var(--line);
  background: #fff;
  position: relative;
}
.dp-iconbtn:hover { border-color: var(--text-3); }
.dp-iconbtn .dp-nav-icon-svg { background-color: var(--text-2); }
.dp-iconbtn .dp-dot { position: absolute; top: 7px; right: 7px; width: 8px; height: 8px; border-radius: 50%; background: var(--alert); border: 2px solid #fff; }

.dp-page { padding: 24px 28px 64px; max-width: 1440px; width: 100%; }

.dp-page-head { margin-bottom: 20px; }
.dp-page-head h1 { font-family: var(--font-en); font-weight: 700; font-size: 28px; letter-spacing: -0.02em; margin: 0 0 4px; color: var(--text); }
.dp-page-head .sub { font-size: 13px; color: var(--text-3); margin: 0; }

/* =================================================================
   BUTTONS
   ================================================================= */
.dp-btn {
  font: inherit; font-size: 13px; font-weight: 600;
  padding: 9px 16px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  display: inline-flex; align-items: center; gap: 6px;
  min-height: var(--touch-min);
}
.dp-btn:hover { border-color: var(--text-3); }
.dp-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.dp-btn.primary:hover { background: var(--accent-mid); border-color: var(--accent-mid); }
.dp-btn.accent { background: var(--sidebar-bg); color: #fff; border-color: var(--sidebar-bg); }
.dp-btn.ghost { background: transparent; }
.dp-btn.danger { background: var(--alert); color: #fff; border-color: var(--alert); }
.dp-btn.small { padding: 6px 10px; font-size: 12px; min-height: 32px; }
.dp-btn .dp-nav-icon-svg { background-color: currentColor; width: 16px; height: 16px; mask-size: 16px 16px; -webkit-mask-size: 16px 16px; }

/* =================================================================
   B1 — Today strip
   ================================================================= */
#dp-today-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 22px; }
.dp-today-chip {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 4px;
  min-height: var(--touch-min);
  text-align: left;
  font-family: inherit;
}
.dp-today-chip:hover { border-color: var(--text-3); }
.dp-today-chip .lbl { font-size: 11px; color: var(--text-3); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
.dp-today-chip .n { font-family: var(--font-en); font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
.dp-today-chip .unit { font-size: 12px; color: var(--text-3); font-weight: 500; margin-left: 4px; }
.dp-today-chip.alert { background: #FFF5F5; border-color: #F3C4C1; }
.dp-today-chip.alert .n { color: var(--alert); }
.dp-today-chip.warn  { background: #FFF8EB; border-color: #E8D0A1; }
.dp-today-chip.warn .n { color: var(--warn); }
.dp-today-chip.info  { background: #E8F5F6; border-color: #BAE0E4; }
.dp-today-chip.info .n { color: var(--accent); }

/* =================================================================
   Home layout: pending approvals (B5) + cards grid
   ================================================================= */
.dp-home { display: grid; grid-template-columns: 1fr 320px; gap: 20px; align-items: start; }

.dp-approvals-bar { margin-bottom: 22px; }
.dp-approvals-bar h2 { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--warn); margin: 0 0 10px; display: flex; align-items: center; gap: 8px; }
.dp-approvals-bar h2 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warn); }
.dp-approval-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.dp-approval-card {
  background: #FFF8EB;
  border: 1px solid #E8D0A1;
  border-left: 3px solid var(--warn);
  border-radius: var(--r-md);
  padding: 14px 16px;
  cursor: pointer;
  font-family: inherit; text-align: left;
  display: flex; flex-direction: column; gap: 6px;
}
.dp-approval-card:hover { border-color: var(--warn); }
.dp-approval-card .meta { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
.dp-approval-card .t { font-weight: 600; font-size: 14px; color: var(--text); }
.dp-approval-card .by { font-size: 12px; color: var(--text-2); }

.dp-hidden { display: none !important; }

/* Cards */
.dp-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 20px;
  margin-bottom: 16px;
}
.dp-card h3 { font-size: 15px; font-weight: 700; margin: 0 0 12px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.dp-card h3 .count { color: var(--text-3); font-weight: 500; font-size: 13px; }
.dp-card .dp-row { padding: 10px 0; border-top: 1px solid var(--line-2); display: flex; align-items: center; gap: 12px; }
.dp-card .dp-row:first-of-type { border-top: none; padding-top: 0; }
.dp-card .dp-row .t { flex: 1; font-size: 13px; color: var(--text); font-weight: 500; }
.dp-card .dp-row .meta { font-size: 11px; color: var(--text-3); }

.dp-preview-item, .dp-home-item, .dp-search-hit {
  display: flex; gap: 12px; align-items: start;
  padding: 10px 0;
  border-top: 1px solid var(--line-2);
  cursor: pointer;
  text-align: left;
  font-family: inherit;
}
.dp-preview-item:first-child, .dp-home-item:first-child { border-top: none; padding-top: 0; }
.dp-preview-item .title, .dp-home-item .title, .dp-search-hit .title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.dp-preview-item .meta, .dp-home-item .meta { font-size: 11px; color: var(--text-3); display: flex; gap: 8px; align-items: center; }
.dp-preview-item:hover, .dp-home-item:hover, .dp-search-hit:hover { background: var(--surface-2); }

/* B2 — unread dot */
.dp-unread::after {
  content: ''; display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--alert);
  margin-left: 6px; vertical-align: middle;
}

.dp-sr-only { position: absolute; left: -10000px; width: 1px; height: 1px; overflow: hidden; }

/* B4 — Task quick buttons */
.dp-task-quick-btn {
  font: inherit; font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--line); background: #fff;
  margin-left: 4px;
  min-height: 28px;
}
.dp-task-quick-btn:hover { border-color: var(--accent); color: var(--accent); }
.dp-task-quick-btn.start { border-color: var(--accent); color: var(--accent); }
.dp-task-quick-btn.done { background: var(--ok); color: #fff; border-color: var(--ok); }

/* Priority + pill */
.dp-pill { display: inline-flex; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
.dp-pill.priority-high, .dp-pill.critical { background: #FFECEB; color: var(--alert); }
.dp-pill.priority-mid, .dp-pill.medium { background: #FFF4E2; color: var(--warn); }
.dp-pill.priority-low, .dp-pill.low  { background: #EBF4EE; color: var(--ok); }
.dp-pill.status-open    { background: var(--gray-100); color: var(--text-2); }
.dp-pill.status-approved { background: #EBF4EE; color: var(--ok); }
.dp-pill.status-pending { background: #FFF4E2; color: var(--warn); }
.dp-pill.status-locked  { background: #E8E4F1; color: #4A2D7A; }

/* =================================================================
   B3 — Search results grouped
   ================================================================= */
.dp-search-panel {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 16px 20px; margin-bottom: 16px;
}
.dp-search-group { margin-bottom: 18px; }
.dp-search-group:last-child { margin-bottom: 0; }
.dp-search-group h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); font-weight: 700; margin: 0 0 8px; }
.dp-search-group .more { font-size: 12px; color: var(--accent); margin-top: 4px; }

/* =================================================================
   Board views
   ================================================================= */
.dp-board-head { display: flex; justify-content: space-between; align-items: end; margin-bottom: 14px; gap: 12px; }
.dp-board-head h2 { font-size: 20px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
.dp-post-table { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; }
.dp-post-row { display: grid; grid-template-columns: 32px 1fr 160px 140px 80px; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--line-2); align-items: center; cursor: pointer; text-align: left; font-family: inherit; width: 100%; background: none; border-left: none; border-right: none; border-bottom: none; }
.dp-post-row:first-child { border-top: none; }
.dp-post-row:hover { background: var(--surface-2); }
.dp-post-row.pinned { background: #FFFBEF; }
.dp-post-row .no { font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }
.dp-post-row .t { font-size: 14px; font-weight: 500; color: var(--text); }
.dp-post-row .a { font-size: 13px; color: var(--text-2); }
.dp-post-row .d { font-size: 12px; color: var(--text-3); }
.dp-post-row .s { text-align: right; }

/* Post view */
.dp-post-view { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 28px 32px; }
.dp-post-view h1 { font-size: 26px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.01em; }
.dp-post-view .post-meta { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; font-size: 12px; color: var(--text-3); padding-bottom: 16px; border-bottom: 1px solid var(--line-2); margin-bottom: 24px; }
.dp-post-content { font-size: 15px; line-height: 1.75; color: var(--text); min-height: 200px; }
.dp-post-content h1, .dp-post-content h2 { letter-spacing: -0.01em; }
.dp-post-content h2 { font-size: 20px; margin-top: 28px; }
.dp-post-content h3 { font-size: 16px; margin-top: 22px; }
.dp-post-content p { margin: 12px 0; }
.dp-post-content ul, .dp-post-content ol { padding-left: 22px; }
.dp-post-content table { border-collapse: collapse; width: 100%; margin: 16px 0; }
.dp-post-content table td, .dp-post-content table th { border: 1px solid var(--line); padding: 8px 10px; text-align: left; }
.dp-post-content code { background: var(--gray-100); padding: 2px 6px; border-radius: 4px; font-family: var(--font-mono); font-size: 13px; }
.dp-post-content pre { background: var(--gray-100); padding: 14px 16px; border-radius: 8px; overflow-x: auto; }
.dp-post-content blockquote { border-left: 3px solid var(--accent); margin: 16px 0; padding: 6px 16px; color: var(--text-2); background: var(--surface-2); }

/* Approval block */
.dp-approval-block { background: #FFF8EB; border: 1px solid #E8D0A1; border-radius: var(--r-md); padding: 16px 20px; margin: 20px 0; }
.dp-approval-block h4 { margin: 0 0 12px; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--warn); }
.dp-approver-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.dp-approver-row { display: flex; gap: 8px; align-items: center; background: #fff; padding: 8px 10px; border-radius: 8px; border: 1px solid #E8D0A1; font-size: 12px; }
.dp-approver-row .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dp-approver-row.pending .status-dot { background: var(--warn); }
.dp-approver-row.approved .status-dot { background: var(--ok); }
.dp-approver-row.rejected .status-dot { background: var(--alert); }
.dp-approval-progress { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin: 10px 0; }
.dp-approval-progress > span { display: block; height: 100%; background: var(--ok); transition: width 300ms; }

/* Locked banner */
.dp-locked-banner { background: #E8E4F1; border: 1px solid #BFB2DD; color: #4A2D7A; padding: 10px 16px; border-radius: var(--r-md); display: flex; gap: 10px; align-items: center; font-size: 13px; margin-bottom: 16px; }

/* =================================================================
   Calendar
   ================================================================= */
.dp-cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.dp-cal-head h2 { font-size: 20px; margin: 0; font-weight: 700; letter-spacing: -0.01em; }
.dp-cal-nav { display: flex; gap: 6px; align-items: center; }
.dp-cal { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; }
.dp-cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--line); background: var(--surface-2); }
.dp-cal-weekdays > div { padding: 10px 12px; font-size: 11px; font-weight: 700; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; text-align: left; }
.dp-cal-weekdays > div.sun { color: var(--alert); }
.dp-cal-weekdays > div.sat { color: var(--accent); }
.dp-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(110px, auto); }
.dp-cal-day { border-top: 1px solid var(--line-2); border-left: 1px solid var(--line-2); padding: 8px; position: relative; cursor: pointer; background: none; font-family: inherit; text-align: left; display: flex; flex-direction: column; min-height: 110px; }
.dp-cal-day:nth-child(7n+1) { border-left: none; }
.dp-cal-day:hover { background: var(--surface-2); }
.dp-cal-day.today { background: #EBF9FB; }
.dp-cal-day.other { color: var(--gray-300); background: var(--surface-2); }
.dp-cal-day .num { font-family: var(--font-en); font-weight: 600; font-size: 13px; margin-bottom: 6px; }
.dp-cal-day.today .num { color: var(--accent); }
.dp-cal-day.sun .num { color: var(--alert); }
.dp-cal-day.sat .num { color: var(--accent); }
.dp-cal-event-strip { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; background: var(--accent); color: #fff; font-weight: 500; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; text-align: left; font-family: inherit; border: none; cursor: pointer; }
.dp-cal-event-strip.meeting  { background: var(--accent); }
.dp-cal-event-strip.deadline { background: var(--alert); }
.dp-cal-event-strip.milestone { background: var(--gold); }
.dp-cal-event-strip.general   { background: var(--gray-500); }
.dp-cal-more { font-size: 11px; color: var(--text-3); font-weight: 600; background: none; border: none; padding: 2px 6px; margin-top: 2px; text-align: left; font-family: inherit; }
.dp-cal-more:hover { color: var(--accent); }

/* =================================================================
   Tasks Kanban
   ================================================================= */
.dp-kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.dp-kanban-col { background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 14px; min-height: 400px; }
.dp-kanban-col h3 { font-size: 13px; font-weight: 700; margin: 0 0 12px; color: var(--text-2); display: flex; align-items: center; justify-content: space-between; }
.dp-kanban-col h3 .count { font-size: 12px; color: var(--text-3); background: #fff; padding: 1px 8px; border-radius: 10px; }
.dp-task-card { background: #fff; border: 1px solid var(--line); border-radius: var(--r-md); padding: 12px; margin-bottom: 8px; font-size: 13px; cursor: pointer; }
.dp-task-card:hover { border-color: var(--accent); }
.dp-task-card .t { font-weight: 600; margin-bottom: 6px; }
.dp-task-card .meta { font-size: 11px; color: var(--text-3); display: flex; gap: 8px; }

/* =================================================================
   Notes + Issues
   ================================================================= */
.dp-note-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.dp-note-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: 14px 16px; cursor: pointer; }
.dp-note-card:hover { border-color: var(--accent); }
.dp-note-card .t { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
.dp-note-card .d { font-size: 12px; color: var(--text-2); line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.dp-note-card .f { display: flex; gap: 8px; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text-3); }

/* =================================================================
   Contacts, Teams, Rules, Versions
   ================================================================= */
.dp-contact-list, .dp-team-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.dp-contact-card, .dp-team-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: 16px; text-align: left; }
.dp-contact-card .name, .dp-team-card .name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.dp-contact-card .role { font-size: 12px; color: var(--text-3); margin-bottom: 8px; }
.dp-contact-card .ln { font-size: 13px; color: var(--text-2); margin-top: 6px; display: flex; gap: 6px; align-items: center; }

.dp-rules-page { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 32px 40px; font-size: 14px; line-height: 1.75; }
.dp-rules-page h2 { font-size: 22px; margin: 32px 0 12px; padding-top: 20px; border-top: 1px solid var(--line-2); }
.dp-rules-page h2:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
.dp-rules-page h3 { font-size: 15px; margin: 20px 0 8px; color: var(--text-2); }
.dp-rules-page code { background: var(--gray-100); padding: 2px 6px; border-radius: 4px; font-family: var(--font-mono); font-size: 13px; }
.dp-rules-page pre { background: var(--gray-800); color: #E8E8E8; padding: 14px 18px; border-radius: 8px; overflow-x: auto; font-size: 13px; line-height: 1.55; }
.dp-rules-page table { border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 13px; }
.dp-rules-page table td, .dp-rules-page table th { border: 1px solid var(--line); padding: 8px 12px; text-align: left; }
.dp-rules-page table th { background: var(--surface-2); font-weight: 700; }

.dp-version-list .dp-version-row { display: grid; grid-template-columns: 100px 120px 1fr 120px; gap: 16px; padding: 12px 16px; border-top: 1px solid var(--line-2); align-items: center; }
.dp-version-list .dp-version-row:first-child { border-top: none; }
.dp-version-list .v { font-family: var(--font-mono); font-weight: 700; color: var(--accent); }

/* =================================================================
   MODAL
   ================================================================= */
.dp-modal-backdrop { position: fixed; inset: 0; background: rgba(3,3,3,0.55); display: flex; align-items: center; justify-content: center; padding: 40px; z-index: 100; }
.dp-modal { background: #fff; border-radius: var(--r-xl); max-width: 900px; width: 100%; max-height: calc(100vh - 80px); display: flex; flex-direction: column; box-shadow: var(--shadow-2); overflow: hidden; }
.dp-modal-head { padding: 18px 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
.dp-modal-head h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.dp-modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.dp-modal-foot { padding: 14px 24px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 10px; background: var(--surface-2); }

.dp-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.dp-field > label { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-2); }
.dp-input, .dp-select, .dp-textarea {
  font: inherit; font-size: 14px;
  padding: 10px 12px; border: 1px solid var(--line);
  border-radius: 8px; background: #fff; color: var(--text);
  min-height: var(--touch-min);
}
.dp-textarea { min-height: 90px; resize: vertical; }
.dp-input:focus, .dp-select:focus, .dp-textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(20,110,122,0.18); }
.dp-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Tiptap */
.dp-tiptap-toolbar { display: flex; gap: 4px; align-items: center; padding: 6px 8px; border: 1px solid var(--line); border-bottom: none; border-top-left-radius: 8px; border-top-right-radius: 8px; background: var(--surface-2); flex-wrap: wrap; }
.dp-tiptap-toolbar button { width: 32px; height: 32px; display: grid; place-items: center; border: none; background: transparent; border-radius: 6px; cursor: pointer; color: var(--text-2); }
.dp-tiptap-toolbar button:hover { background: var(--line); color: var(--text); }
.dp-tiptap-toolbar button.active { background: var(--accent); color: #fff; }
.dp-tiptap-toolbar button .dp-nav-icon-svg { background-color: currentColor; }
.dp-tiptap-toolbar .sep { width: 1px; height: 24px; background: var(--line); margin: 0 4px; }
.dp-editor { border: 1px solid var(--line); border-radius: 0 0 8px 8px; padding: 16px 18px; min-height: 260px; max-height: 460px; overflow-y: auto; font-size: 14px; line-height: 1.7; background: #fff; }
.dp-editor:focus { outline: none; border-color: var(--accent); }
.dp-editor[contenteditable="true"]:focus { box-shadow: 0 0 0 3px rgba(20,110,122,0.18); }
.dp-editor .ProseMirror-selectednode { outline: 2px solid var(--accent); }

/* =================================================================
   Login (overlay)
   ================================================================= */
.dp-login { position: fixed; inset: 0; background: linear-gradient(135deg, #001A33 0%, #002D56 100%); display: flex; align-items: center; justify-content: center; z-index: 50; }
.dp-login-card { background: #fff; border-radius: var(--r-xl); padding: 36px 40px; width: 380px; box-shadow: var(--shadow-2); }
.dp-login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.dp-login-brand img { width: 40px; height: 40px; }
.dp-login-brand h1 { font-family: var(--font-en); font-size: 22px; margin: 0; letter-spacing: -0.02em; }
.dp-login p { font-size: 13px; color: var(--text-3); margin: 0 0 18px; }
.dp-login .dp-btn { width: 100%; justify-content: center; }

/* =================================================================
   RESPONSIVE (Section 3.3)
   ================================================================= */
@media (max-width: 900px) {
  .dp-app { grid-template-columns: 200px 1fr; }
  .dp-home { grid-template-columns: 1fr; }
  #dp-today-strip { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 640px) {
  .dp-app { grid-template-columns: 1fr; }
  .dp-sidebar { position: fixed; left: -260px; width: 260px; z-index: 40; transition: left 200ms; }
  .dp-sidebar.open { left: 0; }
  .dp-mobile-topbar { display: flex !important; }
  .dp-search { max-width: none; }
  .dp-topbar { padding: 10px 16px; }
  .dp-page { padding: 16px; }
  .dp-input { font-size: 16px; } /* iOS zoom fix */
  .dp-kanban { grid-template-columns: 1fr; }
}
@media (max-width: 520px) {
  #dp-today-strip { grid-template-columns: 1fr 1fr; }
  .dp-search { width: 100%; }
  .dp-topbar { flex-wrap: wrap; }
}
.dp-mobile-topbar { display: none; }

@media (prefers-contrast: more) {
  :root {
    --text-3: #3F3F3F;
    --line: #8F8F8F;
  }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

/* Print */
@media print {
  .dp-sidebar, .dp-topbar, .dp-modal-backdrop { display: none !important; }
  .dp-main { display: block; }
}

</style>
