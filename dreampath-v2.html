<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#002D56">
<title>Dreampath PMO</title>
<meta name="robots" content="noindex, nofollow">

<link rel="icon" type="image/svg+xml" href="/img/dreampath-v2/favicon.svg">
<link rel="apple-touch-icon" href="/img/dreampath-v2/logo-mark.svg">

<!-- Inter for UI, JetBrains Mono for IDs/code. Pretendard dropped: ERP target
     uses a single Western UI family; system Korean fallback handles hangul. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Google Sans Flex — variable font (optical size 6..144, weight 1..1000) — is the
     new body default per 2026-04-24 user spec. JetBrains Mono kept for code/IDs. -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=JetBrains+Mono:wght@400;500&display=swap">

<style>
/* ====================================================================
   Dreampath v2 — ERP token system
   Source: user-supplied "PMO Style Tokens v2 (ERP)" + "Layout 시안 1차".
   Kept inline per DREAMPATH.md Section 3.1 (single-source CSS).
   ==================================================================== */
:root {
  /* Brand (CUFS) */
  --navy: #002D56; --navy-700: #01437E; --navy-600: #0A5C9E;
  --green: #146E7A; --gold: #8D714E;

  /* Cool grays — Tailwind-aligned */
  --g-950: #0B1220; --g-900: #111827; --g-800: #1F2937;
  --g-700: #374151; --g-600: #4B5563; --g-500: #6B7280;
  --g-400: #9CA3AF; --g-300: #D1D5DB; --g-200: #E5E7EB;
  --g-150: #EEF1F5; --g-100: #F3F4F6; --g-050: #F9FAFB;
  --white: #FFFFFF;

  --text: var(--g-900); --text-2: var(--g-700); --text-3: var(--g-500);
  --text-on-navy: #FFFFFF; --text-on-navy-dim: #B8C5D4;

  --ok: #0F7A3B; --warn: #B25E00; --alert: #B42318; --info: var(--navy-600);
  --ok-bg: #EDF7F0; --warn-bg: #FCF1E1; --alert-bg: #FCECEA; --info-bg: #EAF2FA;

  --r-sm: 2px; --r-md: 3px; --r-lg: 4px;

  --bd: 1px solid var(--g-200);
  --bd-strong: 1px solid var(--g-300);
  --bd-navy: 1px solid var(--navy);

  --shadow-pop: 0 2px 8px rgba(17,24,39,0.08), 0 0 0 1px rgba(17,24,39,0.05);
  --focus-ring: 0 0 0 2px var(--navy-600), 0 0 0 4px rgba(10,92,158,0.25);

  --font: "Google Sans Flex", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
         "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --fs-10: 10px; --fs-11: 11px; --fs-12: 12px; --fs-13: 13px;
  --fs-14: 14px; --fs-15: 15px; --fs-16: 16px; --fs-18: 18px;
  --fs-20: 20px; --fs-24: 24px;

  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-8: 32px; --s-10: 40px;

  --row-compact: 28px;
  --row-default: 32px;
  --row-comfort: 40px;
  --touch-min: 40px;

  --ease-swift: cubic-bezier(0.2, 0, 0, 1);
  --ease-decel: cubic-bezier(0.05, 0.7, 0.1, 1);
  --ease-spring: cubic-bezier(0.5, 1.6, 0.3, 1);
  --dur-instant: 80ms; --dur-swift: 120ms;
  --dur-moderate: 200ms; --dur-reveal: 280ms;

  --dv-1: #002D56; --dv-2: #0A5C9E; --dv-3: #146E7A; --dv-4: #8D714E;
  --dv-5: #B25E00; --dv-6: #5D4EA8; --dv-7: #9C2C6F; --dv-8: #495057;

  --side-w: 232px;
}

/* Per-user density, persisted in localStorage */
html[data-density="compact"] { --row-default: 28px; --touch-min: 32px; }
html[data-density="comfort"] { --row-default: 40px; --touch-min: 44px; }

@media (prefers-reduced-motion: reduce) {
  :root { --dur-instant: 0ms; --dur-swift: 0ms; --dur-moderate: 0ms; --dur-reveal: 0ms; }
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    transition-duration: 0.001ms !important;
  }
}
@media (prefers-contrast: more) {
  :root { --text-2: #1F2937; --text-3: #374151; --g-200: #9CA3AF; }
}

/* Reset + base */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { height: 100%; }
body {
  min-height: 100%;
  background: var(--g-050);
  color: var(--text);
  font: var(--fs-13)/1.45 var(--font);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
a { color: var(--navy-600); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; }

.dp-skip {
  position: absolute; left: 0; top: -44px;
  background: var(--navy); color: #fff;
  padding: 8px 14px; font-size: var(--fs-12); font-weight: 600;
  z-index: 9999; border-bottom-right-radius: var(--r-sm);
}
.dp-skip:focus, .dp-skip:focus-visible { top: 0; outline: none; }

:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--r-sm); }
:focus:not(:focus-visible) { outline: none; }
.dp-sr-only {
  position: absolute !important; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
  white-space: nowrap; border: 0;
}

/* Signature thread — navy→green, 2px, top of every page + print headers */
.dp-thread {
  height: 2px;
  background: linear-gradient(90deg, var(--navy) 0%, var(--navy-600) 40%, var(--green) 100%);
  flex-shrink: 0;
}

/* ====================================================================
   Shell
   ==================================================================== */
.dp-app { display: grid; grid-template-columns: var(--side-w) 1fr; min-height: 100vh; }

.dp-side {
  background: var(--navy); color: var(--text-on-navy);
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto; display: flex; flex-direction: column;
}
.dp-side-brand {
  padding: 14px 16px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 10px;
}
.dp-side-brand img { width: 28px; height: 28px; flex-shrink: 0; }
.dp-side-brand .wm { display: flex; flex-direction: column; line-height: 1.2; }
.dp-side-brand .wm strong {
  color: #fff; font-size: var(--fs-13); font-weight: 700; letter-spacing: 0.01em;
}
.dp-side-brand .wm span {
  color: var(--text-on-navy-dim); font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
}

.dp-side-nav { flex: 1; padding: 8px 0; }
.dp-side-nav h3 {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-on-navy-dim);
  padding: 12px 16px 6px; margin: 0; font-weight: 600;
}
.dp-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px; height: var(--row-default);
  color: var(--text-on-navy-dim);
  font-size: var(--fs-13); font-weight: 400;
  background: none; border: none; width: 100%; text-align: left;
  font-family: inherit; cursor: pointer; position: relative;
  transition: background var(--dur-swift) var(--ease-swift), color var(--dur-swift) var(--ease-swift);
}
.dp-nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
.dp-nav-item[aria-current="page"] {
  background: rgba(255,255,255,0.08); color: #fff; font-weight: 500;
}
.dp-nav-item[aria-current="page"]::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px; background: #fff;
}
.dp-nav-item .ico {
  width: 14px; height: 14px; flex-shrink: 0;
  background-color: currentColor;
  -webkit-mask-image: var(--dp-icon); mask-image: var(--dp-icon);
  -webkit-mask-size: 14px 14px; mask-size: 14px 14px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
}
.dp-nav-item .dp-nav-flag {
  width: 18px; height: 18px;
  display: grid; place-items: center;
  font-size: 13px; line-height: 1; flex-shrink: 0;
  font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", var(--font);
}
.dp-nav-item .count {
  margin-left: auto;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-on-navy-dim);
  background: rgba(255,255,255,0.08);
  padding: 1px 5px; border-radius: var(--r-sm);
}

.dp-side-foot {
  padding: 12px 16px 14px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.dp-side-session {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; color: var(--text-on-navy-dim);
  padding: 6px 10px; margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.1); border-radius: var(--r-sm);
  background: rgba(255,255,255,0.03);
}
.dp-side-session strong {
  color: #fff; font-family: var(--font-mono); font-size: 11px; font-weight: 500;
}
.dp-side-version {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; color: var(--text-on-navy-dim);
  padding: 0 10px; margin-bottom: 10px;
  letter-spacing: 0.04em;
}
.dp-side-version .dp-ver-num {
  font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.7); font-weight: 500;
}
.dp-side-version a {
  color: var(--text-on-navy-dim); font-size: 10px; text-decoration: none;
}
.dp-side-version a:hover { color: #fff; text-decoration: underline; }
.dp-side-user { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
.dp-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--green); color: #fff;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.dp-side-user .who { color: #fff; font-size: var(--fs-12); font-weight: 500; line-height: 1.2; }
.dp-side-user .role { color: var(--text-on-navy-dim); font-size: 10px; letter-spacing: 0.02em; line-height: 1.2; margin-top: 2px; }
.dp-signout {
  width: 100%; height: var(--row-compact);
  background: transparent; color: var(--text-on-navy-dim);
  border: 1px solid rgba(255,255,255,0.12); border-radius: var(--r-sm);
  font-size: var(--fs-12); font-weight: 500;
  transition: background var(--dur-swift), color var(--dur-swift);
}
.dp-signout:hover { background: rgba(180,35,24,0.15); color: #fff; border-color: rgba(180,35,24,0.4); }

/* ====================================================================
   Main column
   ==================================================================== */
.dp-main { display: flex; flex-direction: column; min-width: 0; }
.dp-topbar {
  display: flex; align-items: center; gap: var(--s-4);
  padding: 0 var(--s-5); height: 48px;
  background: #fff; border-bottom: var(--bd);
  position: sticky; top: 0; z-index: 20;
}
.dp-mob-menu { display: none; }
.dp-crumbs {
  display: flex; align-items: center; gap: 8px;
  font-size: var(--fs-12); color: var(--text-3);
}
.dp-crumbs .sep { color: var(--g-300); }
.dp-crumbs strong { color: var(--text); font-weight: 500; }
.dp-top-spacer { flex: 1; }

.dp-search { position: relative; width: 320px; max-width: 40vw; }
.dp-search input {
  width: 100%; height: var(--row-compact);
  padding: 0 36px 0 30px;
  border: 1px solid var(--g-300); border-radius: var(--r-sm);
  background: #fff; color: var(--text);
  font: inherit; font-size: var(--fs-12);
}
.dp-search input:focus { outline: none; border-color: var(--navy-600); box-shadow: 0 0 0 1px var(--navy-600); }
.dp-search::before {
  content: ""; position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px;
  background-color: var(--text-3);
  -webkit-mask: url('/img/dreampath-v2/icons/search.svg') center/14px 14px no-repeat;
          mask: url('/img/dreampath-v2/icons/search.svg') center/14px 14px no-repeat;
  pointer-events: none;
}
.dp-search kbd {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  border: var(--bd); padding: 1px 5px; border-radius: var(--r-sm); background: var(--g-100);
  pointer-events: none;
}

.dp-switcher {
  display: inline-flex; background: var(--g-100); border: var(--bd); padding: 2px; gap: 2px;
  border-radius: var(--r-sm);
}
.dp-switcher button {
  height: 22px; padding: 0 8px;
  font: inherit; font-size: 11px; font-weight: 500;
  background: transparent; border: none; color: var(--text-2);
  border-radius: var(--r-sm); cursor: pointer;
}
.dp-switcher button.on {
  background: #fff; color: var(--text);
  box-shadow: 0 0 0 1px var(--g-300);
}

.dp-iconbtn {
  width: var(--row-compact); height: var(--row-compact);
  display: grid; place-items: center;
  background: transparent; border: 1px solid transparent; border-radius: var(--r-sm);
  color: var(--text-2); position: relative;
}
.dp-iconbtn:hover { background: var(--g-100); color: var(--text); }
.dp-iconbtn .ico {
  width: 14px; height: 14px;
  background-color: currentColor;
  -webkit-mask-size: 14px 14px; mask-size: 14px 14px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  -webkit-mask-image: var(--dp-icon); mask-image: var(--dp-icon);
}
.dp-iconbtn .dot {
  position: absolute; top: 5px; right: 5px;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--alert);
}

.dp-btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: var(--row-default); padding: 0 12px;
  font: inherit; font-size: var(--fs-13); font-weight: 500;
  border: 1px solid transparent; border-radius: var(--r-sm);
  cursor: pointer;
  transition: background var(--dur-swift), border-color var(--dur-swift);
}
.dp-btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }
.dp-btn-primary { background: var(--navy); color: #fff; border-color: var(--navy); }
.dp-btn-primary:hover { background: var(--navy-700); border-color: var(--navy-700); }
.dp-btn-secondary { background: #fff; color: var(--text); border-color: var(--g-300); }
.dp-btn-secondary:hover { background: var(--g-100); }
.dp-btn-ghost { background: transparent; color: var(--text-2); }
.dp-btn-ghost:hover { background: var(--g-100); color: var(--text); }
.dp-btn-danger { background: #fff; color: var(--alert); border-color: #F5C0BA; }
.dp-btn-danger:hover { background: var(--alert-bg); }
.dp-btn-sm { height: var(--row-compact); padding: 0 8px; font-size: var(--fs-12); }
.dp-btn-ico {
  width: 14px; height: 14px;
  background-color: currentColor;
  -webkit-mask-size: 14px 14px; mask-size: 14px 14px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
}

/* Page body — fills the main column; ERP grids can sprawl as wide as needed. */
.dp-page { padding: var(--s-6) var(--s-6); width: 100%; }
.dp-page-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: var(--s-5); flex-wrap: wrap; gap: 8px;
}
.dp-page-head h1 {
  margin: 0; font-size: var(--fs-20); font-weight: 600; letter-spacing: -0.005em;
  color: var(--text);
}
.dp-page-head .meta { color: var(--text-3); font-size: var(--fs-12); }
.dp-page-head .meta strong { color: var(--text-2); font-weight: 600; }

.dp-h2 {
  font-size: var(--fs-11); letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); margin: 0 0 var(--s-3); font-weight: 600;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.dp-h2 a { color: var(--text-3); font-size: 11px; letter-spacing: normal; text-transform: none; }
.dp-h2 a:hover { color: var(--navy-600); text-decoration: none; }

/* Stat strip — 5 chips, colored left border by tone */
.dp-stat-strip {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 0; margin-bottom: var(--s-6);
  border: var(--bd); background: #fff;
}
.dp-stat {
  padding: 12px 16px;
  border-right: var(--bd); border-left: 2px solid transparent;
  display: flex; flex-direction: column; gap: 4px;
  text-align: left; background: #fff;
  border-top: none; border-bottom: none;
  font: inherit; cursor: pointer;
  transition: background var(--dur-swift);
}
.dp-stat:last-child { border-right: none; }
.dp-stat:hover { background: var(--g-100); }
.dp-stat .lbl {
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); font-weight: 600;
}
.dp-stat .val { display: flex; align-items: baseline; gap: 8px; }
.dp-stat .n {
  font-family: var(--font-mono); font-size: 24px; font-weight: 500;
  color: var(--text); line-height: 1; letter-spacing: -0.02em;
}
.dp-stat .sub { font-size: var(--fs-12); color: var(--text-3); line-height: 1.4; }
.dp-stat.alert { border-left-color: var(--alert); }
.dp-stat.alert .n { color: var(--alert); }
.dp-stat.warn  { border-left-color: var(--warn); }
.dp-stat.warn  .n { color: var(--warn); }
.dp-stat.info  { border-left-color: var(--navy-600); }
.dp-stat.ok    { border-left-color: var(--ok); }
.dp-stat.ok    .n { color: var(--ok); }

/* Home grid */
.dp-home {
  display: grid; grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
  gap: var(--s-5); align-items: flex-start;
}
.dp-home-col { display: flex; flex-direction: column; gap: var(--s-5); min-width: 0; }

/* Panel */
.dp-panel { background: #fff; border: var(--bd); }
.dp-panel-head {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 10px 14px; border-bottom: var(--bd);
}
.dp-panel-head h3 {
  margin: 0; font-size: var(--fs-13); font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.dp-panel-head .count { font-size: 11px; color: var(--text-3); font-weight: 400; }
.dp-panel-head a { font-size: 11px; color: var(--text-3); }
.dp-panel-head a:hover { color: var(--navy-600); text-decoration: none; }
.dp-panel-body.pad { padding: 14px; }

/* Audit-row style (recent/approvals/activity) */
.dp-audit-row {
  display: grid; grid-template-columns: 1fr auto;
  gap: 12px; padding: 10px 14px;
  border-bottom: 1px solid var(--g-150); align-items: center;
  text-align: left; width: 100%;
  background: #fff; border-left: none; border-right: none; border-top: none;
  font: inherit;
}
.dp-audit-row:last-child { border-bottom: none; }
.dp-audit-row:hover { background: var(--g-150); }
.dp-audit-row[role="button"] { cursor: pointer; }
.dp-audit-row .main { min-width: 0; }
.dp-audit-row .title {
  font-size: var(--fs-13); font-weight: 500; color: var(--text);
  display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
}
.dp-audit-row .meta {
  font-size: 11px; color: var(--text-3);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.dp-audit-row .meta .ts { font-family: var(--font-mono); }
.dp-audit-row .meta .who { font-weight: 500; color: var(--text-2); }
.dp-audit-row .actions { display: flex; gap: 6px; flex-shrink: 0; }

/* Post / announcement list */
.dp-post-item {
  padding: 12px 14px;
  border-bottom: 1px solid var(--g-150);
  display: block; width: 100%; text-align: left;
  background: #fff; border-left: none; border-right: none; border-top: none;
  font: inherit; cursor: pointer;
  transition: background var(--dur-swift);
}
.dp-post-item:last-child { border-bottom: none; }
.dp-post-item:hover { background: var(--g-150); }
.dp-post-item .t {
  font-size: var(--fs-13); font-weight: 500; color: var(--text);
  margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
}
.dp-post-item .excerpt {
  font-size: var(--fs-12); color: var(--text-2); line-height: 1.5;
  margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.dp-post-item .meta { font-size: 11px; color: var(--text-3); display: flex; gap: 8px; align-items: center; }
.dp-post-item .meta .who { font-weight: 500; color: var(--text-2); }

.dp-pin {
  display: inline-block; width: 12px; height: 12px; flex-shrink: 0;
  background-color: var(--warn);
  -webkit-mask: url('/img/dreampath-v2/icons/scroll.svg') center/12px 12px no-repeat;
          mask: url('/img/dreampath-v2/icons/scroll.svg') center/12px 12px no-repeat;
}
.dp-unread-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--navy-600); flex-shrink: 0;
}

/* Tables — ERP staple */
.dp-table { width: 100%; border-collapse: collapse; font-size: var(--fs-13); background: #fff; }
.dp-table th, .dp-table td {
  text-align: left; padding: 8px 12px;
  border-bottom: var(--bd); vertical-align: middle;
}
.dp-table thead th {
  background: var(--g-100);
  font-size: var(--fs-12); font-weight: 600;
  color: var(--text-2); letter-spacing: 0.02em; text-transform: uppercase;
  height: var(--row-default);
}
.dp-table tbody tr { transition: background var(--dur-instant); }
.dp-table tbody tr:hover { background: var(--g-150); cursor: pointer; }
.dp-table tbody td { height: var(--row-default); }
.dp-table tbody tr:last-child td { border-bottom: none; }
.dp-table .mono { font-family: var(--font-mono); font-size: var(--fs-12); color: var(--text-3); }
.dp-table td.num { font-family: var(--font-mono); text-align: right; }

/* Tags */
.dp-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 6px; font-size: 11px; font-weight: 500;
  border-radius: var(--r-sm); border: 1px solid; line-height: 1.4;
}
.dp-tag.ok    { background: var(--ok-bg);    color: var(--ok);    border-color: rgba(15,122,59,0.2); }
.dp-tag.warn  { background: var(--warn-bg);  color: var(--warn);  border-color: rgba(178,94,0,0.2); }
.dp-tag.alert { background: var(--alert-bg); color: var(--alert); border-color: rgba(180,35,24,0.2); }
.dp-tag.info  { background: var(--info-bg);  color: var(--info);  border-color: rgba(10,92,158,0.2); }
.dp-tag.neutral { background: var(--g-100); color: var(--text-2); border-color: var(--g-200); }

/* Right rail components */
.dp-schedule-row {
  display: grid; grid-template-columns: 56px 1fr;
  gap: 12px; padding: 10px 14px;
  border-bottom: 1px solid var(--g-150);
}
.dp-schedule-row:last-child { border-bottom: none; }
.dp-schedule-row .t { font-family: var(--font-mono); font-size: var(--fs-13); font-weight: 500; color: var(--text); }
.dp-schedule-row .body { min-width: 0; }
.dp-schedule-row .body .title { font-size: var(--fs-13); color: var(--text); font-weight: 500; margin-bottom: 2px; }
.dp-schedule-row .body .sub { font-size: 11px; color: var(--text-3); }

.dp-team-online { display: flex; gap: 6px; flex-wrap: wrap; padding: 14px; }
.dp-team-online .dp-avatar { width: 28px; height: 28px; font-size: 10px; }
.dp-team-online .more {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--g-100); color: var(--text-3); font-size: 10px; font-weight: 500;
  display: grid; place-items: center; border: 1px dashed var(--g-300);
}

.dp-progress { padding: 14px; }
.dp-progress .top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.dp-progress .val { font-family: var(--font-mono); font-size: 16px; color: var(--text); font-weight: 500; }
.dp-progress .bar {
  height: 6px; background: var(--g-200); border-radius: 3px; overflow: hidden; margin-bottom: 10px;
}
.dp-progress .fill {
  height: 100%; background: var(--green);
  transition: width var(--dur-reveal) var(--ease-decel);
}
.dp-progress .legend {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
  font-size: 11px; color: var(--text-3);
}
.dp-progress .legend > div { display: flex; flex-direction: column; gap: 2px; }
.dp-progress .legend strong {
  color: var(--text); font-weight: 600;
  font-family: var(--font-mono); font-size: var(--fs-13);
}

/* Command palette */
.dp-cmd-backdrop {
  position: fixed; inset: 0; background: rgba(17,24,39,0.4);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 15vh; z-index: 200;
  animation: fadein var(--dur-swift) var(--ease-swift);
}
@keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
.dp-cmd {
  width: 560px; max-width: 90vw;
  background: #fff; border: var(--bd);
  box-shadow: var(--shadow-pop); border-radius: var(--r-md);
  overflow: hidden;
  animation: cmdin var(--dur-moderate) var(--ease-spring);
}
@keyframes cmdin { from { transform: translateY(-8px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
.dp-cmd-in { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: var(--bd); }
.dp-cmd-in input {
  flex: 1; border: none; outline: none;
  font: inherit; font-size: var(--fs-14); color: var(--text);
  background: transparent;
}
.dp-cmd-in input::placeholder { color: var(--text-3); }
.dp-cmd-in kbd {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  border: var(--bd); padding: 1px 5px; border-radius: var(--r-sm); background: var(--g-100);
}
.dp-cmd-list { max-height: 360px; overflow-y: auto; padding: 6px 0; }
.dp-cmd-group {
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); padding: 8px 14px 4px; font-weight: 600;
}
.dp-cmd-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; font-size: var(--fs-13); color: var(--text);
  background: transparent; border: none; text-align: left; width: 100%;
  font: inherit; cursor: pointer;
}
.dp-cmd-item:hover, .dp-cmd-item.on { background: var(--navy); color: #fff; }
.dp-cmd-item:hover .shortcut, .dp-cmd-item.on .shortcut { color: rgba(255,255,255,0.75); }
.dp-cmd-item .shortcut { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
.dp-cmd-empty { padding: 40px 14px; text-align: center; color: var(--text-3); font-size: var(--fs-12); }

/* Modal — centered dialog (not a right drawer) */
.dp-modal-backdrop {
  position: fixed; inset: 0; background: rgba(17,24,39,0.45);
  z-index: 150; animation: fadein var(--dur-swift);
  display: flex; align-items: center; justify-content: center;
  padding: 5vh 24px;
}
.dp-modal {
  position: relative;
  width: 820px; max-width: 95vw; max-height: 90vh;
  background: #fff; border: var(--bd); border-radius: var(--r-md);
  box-shadow: var(--shadow-pop);
  display: flex; flex-direction: column;
  animation: modalin var(--dur-reveal) var(--ease-decel);
  z-index: 151;
  overflow: hidden;
}
@keyframes modalin { from { transform: translateY(8px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
.dp-modal-head {
  padding: 12px 20px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: var(--bd);
}
.dp-modal-head h2 { margin: 0; font-size: var(--fs-16); font-weight: 600; }
.dp-modal-body { padding: 20px; overflow-y: auto; flex: 1; font-size: var(--fs-14); line-height: 1.6; }
.dp-modal-body h1, .dp-modal-body h2, .dp-modal-body h3 { margin-top: 1em; margin-bottom: 0.4em; font-weight: 600; letter-spacing: -0.005em; }
.dp-modal-body h2 { font-size: var(--fs-16); }
.dp-modal-body h3 { font-size: var(--fs-14); color: var(--text-2); }
.dp-modal-body p { margin: 0 0 10px; }
.dp-modal-body ul, .dp-modal-body ol { padding-left: 20px; margin: 0 0 10px; }
.dp-modal-body blockquote { border-left: 2px solid var(--g-300); padding: 4px 12px; color: var(--text-2); margin: 8px 0; background: var(--g-050); }
.dp-modal-body code { font-family: var(--font-mono); font-size: var(--fs-12); background: var(--g-100); padding: 1px 5px; border-radius: var(--r-sm); }
.dp-modal-body pre { background: var(--g-900); color: var(--g-100); padding: 12px 16px; border-radius: var(--r-sm); overflow-x: auto; font-family: var(--font-mono); font-size: var(--fs-12); }
.dp-modal-body pre code { background: transparent; padding: 0; color: inherit; }
.dp-modal-body table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: var(--fs-13); }
.dp-modal-body table th, .dp-modal-body table td { border: var(--bd); padding: 6px 10px; text-align: left; }
.dp-modal-body table th { background: var(--g-100); font-weight: 600; }
.dp-modal-foot {
  padding: 10px 20px;
  border-top: var(--bd); background: var(--g-050);
  display: flex; justify-content: flex-end; gap: 8px;
}

/* Form field */
.dp-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
.dp-field label {
  font-size: var(--fs-12); color: var(--text-2); font-weight: 500;
  letter-spacing: 0.02em;
}
.dp-input, .dp-select, .dp-textarea {
  height: var(--row-default); padding: 0 10px;
  border: 1px solid var(--g-300); border-radius: var(--r-sm);
  background: #fff; color: var(--text); font: inherit; font-size: var(--fs-13);
}
.dp-textarea { min-height: 120px; padding: 8px 10px; resize: vertical; }
.dp-input:focus, .dp-select:focus, .dp-textarea:focus {
  outline: none; border-color: var(--navy-600); box-shadow: 0 0 0 1px var(--navy-600);
}

/* Empty state */
.dp-empty { padding: 40px 24px; text-align: center; background: #fff; border: var(--bd); }
.dp-empty .mark {
  width: 48px; height: 48px; margin: 0 auto 12px;
  border: 1px dashed var(--g-300);
  display: grid; place-items: center; color: var(--navy); border-radius: var(--r-sm);
}
.dp-empty .mark .ico {
  width: 20px; height: 20px; background-color: currentColor;
  -webkit-mask-size: 20px 20px; mask-size: 20px 20px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  -webkit-mask-image: var(--dp-icon); mask-image: var(--dp-icon);
}
.dp-empty h4 { margin: 0 0 4px; font-size: var(--fs-14); font-weight: 600; color: var(--text); }
.dp-empty p { margin: 0 0 12px; font-size: var(--fs-13); color: var(--text-3); }

/* Login */
.dp-login {
  position: fixed; inset: 0;
  background: radial-gradient(circle at 30% 20%, var(--navy-600) 0%, var(--navy) 40%, #001830 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 24px; z-index: 60;
}
.dp-login-card {
  width: 360px; max-width: 90vw;
  background: #fff; border: var(--bd);
  padding: 28px 32px 24px;
}
.dp-login-card .brand {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.dp-login-card .brand img { width: 32px; height: 32px; }
.dp-login-card .brand h1 { margin: 0; font-size: var(--fs-16); font-weight: 700; letter-spacing: -0.005em; line-height: 1.1; }
.dp-login-card .brand span { font-size: 10px; color: var(--text-3); letter-spacing: 0.12em; text-transform: uppercase; display: block; margin-top: 3px; }
.dp-login-card p { font-size: var(--fs-12); color: var(--text-3); margin: 0 0 16px; }
.dp-login-card .dp-btn { width: 100%; justify-content: center; }

/* ====================================================================
   Calendar month grid
   ==================================================================== */
.dp-cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 0;
  background: var(--g-200);
  border: var(--bd);
}
.dp-cal-head { border: none; background: transparent; }
.dp-cal-wdh {
  padding: 8px 10px; background: var(--g-100);
  font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-2); font-weight: 600; border: var(--bd); border-top: none;
}
.dp-cal-day {
  background: #fff; min-height: 110px;
  padding: 6px 8px;
  display: flex; flex-direction: column; gap: 3px;
  cursor: pointer;
  transition: background var(--dur-instant);
}
.dp-cal-day:hover { background: var(--g-050); }
.dp-cal-day--empty { background: var(--g-100); cursor: default; }
.dp-cal-day--empty:hover { background: var(--g-100); }
.dp-cal-day--today { background: var(--info-bg); }
.dp-cal-day--today:hover { background: #DDE9F5; }
.dp-cal-day--has .dp-cal-dnum { color: var(--navy-600); font-weight: 600; }
.dp-cal-dnum { font-size: var(--fs-12); color: var(--text-2); font-weight: 500; font-family: var(--font-mono); }
.dp-cal-day--today .dp-cal-dnum {
  color: #fff; background: var(--navy-600);
  width: 20px; height: 20px; display: inline-grid; place-items: center;
  border-radius: 50%; font-size: 10px;
}
.dp-cal-ev {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 4px;
  font-size: 11px; color: var(--text);
  border-left: 2px solid var(--dv-2); background: var(--g-050);
  border-radius: var(--r-sm);
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.dp-cal-ev .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
.dp-cal-ev .name { overflow: hidden; text-overflow: ellipsis; }
.dp-cal-ev:hover { background: var(--info-bg); }
.dp-cal-more { font-size: 10px; color: var(--text-3); padding-left: 4px; }

/* ====================================================================
   Tiptap editor — ported from production /dreampath styling,
   retuned to ERP tokens (2px radius, flat borders, Inter body)
   ==================================================================== */
.dp-te-wrapper { position: relative; }
.dp-te-toolbar {
  display: flex; flex-wrap: wrap; gap: 2px;
  padding: 4px 6px;
  background: var(--g-050);
  border: var(--bd); border-bottom: none;
  border-top-left-radius: var(--r-sm);
  border-top-right-radius: var(--r-sm);
}
.dp-te-btn {
  width: 28px; height: 28px; display: grid; place-items: center;
  background: transparent; border: 1px solid transparent; border-radius: var(--r-sm);
  color: var(--text-2); cursor: pointer;
  font: inherit; font-size: 13px; font-weight: 500;
  padding: 0;
}
.dp-te-btn:hover { background: var(--g-100); color: var(--text); }
.dp-te-btn.is-active { background: var(--navy); color: #fff; border-color: var(--navy); }
.dp-te-btn .ico {
  width: 14px; height: 14px; background-color: currentColor;
  -webkit-mask-size: 14px 14px; mask-size: 14px 14px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  -webkit-mask-image: var(--dp-icon); mask-image: var(--dp-icon);
}
.dp-te-sep { width: 1px; background: var(--g-300); margin: 2px 4px; }
.dp-te-editor {
  border: var(--bd);
  border-radius: 0 0 var(--r-sm) var(--r-sm);
  min-height: 220px; max-height: 55vh; overflow-y: auto;
  padding: 14px 16px;
  font-size: var(--fs-14); line-height: 1.65;
  background: #fff;
}
.dp-te-editor:focus-within { border-color: var(--navy-600); box-shadow: 0 0 0 1px var(--navy-600); }
.dp-te-editor .ProseMirror { outline: none; min-height: 190px; }
.dp-te-editor .ProseMirror p { margin: 0 0 8px; }
.dp-te-editor .ProseMirror h2 { font-size: var(--fs-18); font-weight: 600; margin: 14px 0 8px; }
.dp-te-editor .ProseMirror h3 { font-size: var(--fs-16); font-weight: 600; margin: 12px 0 6px; color: var(--text-2); }
.dp-te-editor .ProseMirror ul, .dp-te-editor .ProseMirror ol { padding-left: 22px; margin: 0 0 8px; }
.dp-te-editor .ProseMirror blockquote { border-left: 2px solid var(--g-300); padding: 4px 12px; color: var(--text-2); margin: 6px 0; }
.dp-te-editor .ProseMirror code { font-family: var(--font-mono); background: var(--g-100); padding: 1px 4px; border-radius: var(--r-sm); font-size: var(--fs-12); }
.dp-te-editor .ProseMirror table { border-collapse: collapse; margin: 8px 0; }
.dp-te-editor .ProseMirror table th, .dp-te-editor .ProseMirror table td { border: var(--bd); padding: 6px 10px; min-width: 60px; }
.dp-te-editor .ProseMirror table th { background: var(--g-100); font-weight: 600; }
.dp-te-editor .ProseMirror img { max-width: 100%; height: auto; }

/* File picker + list */
.dp-file-picker {
  display: flex; gap: 8px; align-items: center;
  margin-top: 12px;
}
.dp-file-picker .hint { font-size: 11px; color: var(--text-3); }
.dp-file-list {
  margin-top: 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.dp-file-item {
  display: grid; grid-template-columns: auto 1fr auto auto;
  gap: 10px; align-items: center;
  padding: 6px 10px;
  border: var(--bd); border-radius: var(--r-sm);
  background: var(--g-050);
  font-size: var(--fs-12);
}
.dp-file-item .name { color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dp-file-item .size { color: var(--text-3); font-family: var(--font-mono); }
.dp-file-item .state { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }
.dp-file-item .state.ok { color: var(--ok); }
.dp-file-item .state.err { color: var(--alert); }
.dp-file-item .rm {
  width: 22px; height: 22px; display: grid; place-items: center;
  background: transparent; border: none; border-radius: var(--r-sm);
  color: var(--text-3);
}
.dp-file-item .rm:hover { background: var(--g-150); color: var(--alert); }
.dp-file-item .rm .ico {
  width: 12px; height: 12px;
  background-color: currentColor;
  -webkit-mask: url('/img/dreampath-v2/icons/x.svg') center/12px 12px no-repeat;
          mask: url('/img/dreampath-v2/icons/x.svg') center/12px 12px no-repeat;
}

/* Post-not-found / error inline card in modal body */
.dp-inline-error {
  padding: 24px; text-align: center;
  border: 1px dashed var(--g-300); border-radius: var(--r-sm);
  background: var(--g-050); color: var(--text-2); font-size: var(--fs-13);
}
.dp-inline-error .icon {
  width: 32px; height: 32px; margin: 0 auto 8px;
  border: 1px dashed var(--g-300); border-radius: 50%;
  display: grid; place-items: center; color: var(--alert);
  background-color: currentColor;
  -webkit-mask: url('/img/dreampath-v2/icons/x.svg') center/14px 14px no-repeat;
          mask: url('/img/dreampath-v2/icons/x.svg') center/14px 14px no-repeat;
}

/* Toast */
.dp-toast-host {
  position: fixed; top: 16px; right: 16px; z-index: 300;
  display: flex; flex-direction: column; gap: 8px;
}
.dp-toast {
  background: var(--text); color: #fff;
  padding: 10px 14px; font-size: var(--fs-13); border-radius: var(--r-sm);
  box-shadow: var(--shadow-pop);
  animation: tin var(--dur-moderate) var(--ease-decel);
}
.dp-toast.err { background: var(--alert); }
.dp-toast.ok  { background: var(--ok); }
@keyframes tin { from { transform: translateX(16px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }

/* Responsive */
@media (max-width: 1100px) {
  .dp-stat-strip { grid-template-columns: repeat(3, 1fr); }
  .dp-stat-strip > :nth-child(n+4) { border-top: var(--bd); }
  .dp-home { grid-template-columns: 1fr; }
}
@media (max-width: 820px) {
  .dp-app { grid-template-columns: 1fr; }
  .dp-side { position: fixed; left: -240px; top: 0; width: 232px; z-index: 40; transition: left var(--dur-reveal) var(--ease-decel); }
  .dp-side.open { left: 0; }
  .dp-mob-menu { display: inline-grid !important; }
  .dp-search { display: none; }
  .dp-switcher { display: none; }
  .dp-page { padding: 16px; }
  .dp-input, .dp-select, .dp-textarea { font-size: 16px; }
}
@media (max-width: 520px) {
  .dp-stat-strip { grid-template-columns: 1fr 1fr; }
  .dp-stat-strip > :nth-child(n+3) { border-top: var(--bd); }
  .dp-stat-strip > :nth-child(odd) { border-right: var(--bd); }
  .dp-stat-strip > :nth-child(even) { border-right: none; }
  .dp-modal-backdrop { padding: 0; align-items: stretch; }
  .dp-modal { width: 100vw; max-width: 100vw; max-height: 100vh; border-radius: 0; border: none; }
}

/* Print — ERP-grade */
@media print {
  body { background: #fff; font-family: Georgia, "Times New Roman", serif; }
  .dp-side, .dp-topbar, .dp-cmd-backdrop, .dp-modal-backdrop, .dp-signout { display: none !important; }
  .dp-app { display: block; }
  .dp-page { padding: 24px 28px; max-width: none; }
  .dp-thread { display: block !important; margin-bottom: 20px; }
  .dp-panel { border: 1px solid #000; page-break-inside: avoid; }
}

.dp-hidden { display: none !important; }

</style>

<a class="dp-skip" href="#dp-main">Skip to main</a>

<div id="dp-root"></div>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

<!-- Tiptap loader — esm.sh allowed in CSP connect-src. Sets window.__DP_Tiptap
     and fires 'tiptap-ready' so _waitForTiptap(cb) can mount lazily. -->
<script type="module">
  try {
    const [
      { Editor },
      { default: StarterKit },
      { default: Table },
      { default: TableRow },
      { default: TableHeader },
      { default: TableCell },
      { default: Image },
    ] = await Promise.all([
      import('https://esm.sh/@tiptap/core@2'),
      import('https://esm.sh/@tiptap/starter-kit@2'),
      import('https://esm.sh/@tiptap/extension-table@2'),
      import('https://esm.sh/@tiptap/extension-table-row@2'),
      import('https://esm.sh/@tiptap/extension-table-header@2'),
      import('https://esm.sh/@tiptap/extension-table-cell@2'),
      import('https://esm.sh/@tiptap/extension-image@2'),
    ]);
    window.__DP_Tiptap = { Editor, StarterKit, Table, TableRow, TableHeader, TableCell, Image };
    window.dispatchEvent(new CustomEvent('tiptap-ready'));
  } catch (e) {
    console.warn('[Dreampath v2] Tiptap failed to load:', e);
  }
</script>
