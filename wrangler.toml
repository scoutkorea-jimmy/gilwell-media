# Gilwell Media · Wrangler configuration
# Used for local development with: wrangler pages dev .
# Production settings (D1 binding, secrets) are configured
# in the Cloudflare Pages dashboard, not here.

name = "gilwell-media"
compatibility_date = "2024-09-23"

# Output directory for Cloudflare Pages (static files)
# [2026-07-22] "." → "public". 저장소 루트를 통째로 올리던 것을 바꿔, 배포되는
# 것과 개발용 파일을 구조로 분리한다. functions/ 는 Pages 규약상 루트에 남는다.
pages_build_output_dir = "public"

# ── D1 Database binding (local dev) ──────────────────────────
# Replace database_id with your actual D1 database ID after
# running: wrangler d1 create gilwell-posts
[[d1_databases]]
binding     = "DB"
database_name = "gilwell-posts"
database_id = "619e542b-e3b1-4500-b474-7e9fd87e1169"

[[r2_buckets]]
binding = "POST_IMAGES"
bucket_name = "gilwell-media-images"

[ai]
binding = "AI"

# ── Local secrets for development ────────────────────────────
# Copy .dev.vars.example to .dev.vars and fill in values.
# Never commit .dev.vars to git.
