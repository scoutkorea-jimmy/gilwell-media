name: Deploy Production On Push

# Push to main → Cloudflare Pages production (bpmedia.net) automatically.
#
# Why this file exists: the repo's `deploy.sh` is a manual local helper, and
# `promote-preview.yml` is a controlled gate for the preview→prod flow. Neither
# of them runs on a bare `git push`, so any commit pushed to main without an
# operator running wrangler locally was silently NOT going live. This workflow
# closes that gap.
#
# Required repo secrets (already configured for promote-preview.yml):
#   CLOUDFLARE_API_TOKEN     — Pages:Edit + Workers:Edit token
#   CLOUDFLARE_ACCOUNT_ID    — b8cc5609b10c4df5b8e31aec570937b8
#
# Skip the deploy by including `[skip deploy]` in the commit message — useful
# for docs-only commits or work-in-progress pushes that shouldn't ship yet.

on:
  push:
    branches: [main]
    paths-ignore:
      # Markdown/doc-only changes never need a Pages redeploy. The site doesn't
      # serve these from production, and they thrash the deploy queue when we
      # iterate on README/CLAUDE.md/etc.
      - '**/*.md'
      - 'docs/**'
      - '.obsidian/**'
  workflow_dispatch:
    inputs:
      reason:
        description: Manual redeploy reason
        required: false
        type: string

permissions:
  contents: read
  deployments: write

concurrency:
  # Only the most recent push needs to land — cancel in-flight deploys when a
  # newer commit arrives, so the production tip always reflects HEAD.
  group: deploy-on-push-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip deploy]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Wrangler
        run: npm install -g wrangler@4.72.0

      - name: Check Cloudflare Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID repo secret."
            echo "Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Deploy To Production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          COMMIT_MESSAGE="$(git log -1 --pretty=%s)"
          echo "Deploying $COMMIT_SHA — $COMMIT_MESSAGE"
          wrangler pages deploy . \
            --project-name gilwell-media \
            --branch main \
            --commit-hash "${COMMIT_SHA}" \
            --commit-message "${COMMIT_MESSAGE}"

      - name: Verify Production
        run: |
          # bpmedia.net is the production custom domain. After a successful
          # deploy the new VERSION file should be served within a few seconds.
          set -e
          sleep 5
          SITE_VER=$(curl -sS -m 10 "https://bpmedia.net/VERSION?_=$(date +%s)" -H "Cache-Control: no-cache" | tr -d '[:space:]')
          ADMIN_VER=$(curl -sS -m 10 "https://bpmedia.net/ADMIN_VERSION?_=$(date +%s)" -H "Cache-Control: no-cache" | tr -d '[:space:]')
          echo "bpmedia.net VERSION       → ${SITE_VER}"
          echo "bpmedia.net ADMIN_VERSION → ${ADMIN_VER}"
          if [ -z "${SITE_VER}" ] || [ -z "${ADMIN_VER}" ]; then
            echo "::warning::Could not read /VERSION endpoints from production — Pages may still be propagating."
          fi
