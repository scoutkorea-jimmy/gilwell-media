name: Rollback From Snapshot

on:
  workflow_dispatch:
    inputs:
      snapshot_id:
        description: Snapshot id from release-history/data/release-snapshots.json
        required: true
        type: string
      requested_at:
        description: Rollback request timestamp
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: rollback-snapshot
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    outputs:
      restored_sha: ${{ steps.commit.outputs.restored_sha }}
    steps:
      - name: Checkout Main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Restore Snapshot
        id: restore
        env:
          SNAPSHOT_ID: ${{ github.event.inputs.snapshot_id }}
        run: |
          chmod +x ./scripts/restore_release_snapshot.sh
          ./scripts/restore_release_snapshot.sh "${SNAPSHOT_ID}"

      - name: Commit Rollback
        id: commit
        env:
          SNAPSHOT_ID: ${{ github.event.inputs.snapshot_id }}
        run: |
          git add -A
          if [ -n "$(git status --short)" ]; then
            git commit -m "Rollback to snapshot ${SNAPSHOT_ID}"
            git push origin HEAD:main
            echo "restored_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "No changes detected after restore."
            echo "restored_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: rollback
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Checkout Main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Install Wrangler
        run: npm install -g wrangler@4.72.0

      - name: Configure Wrangler OAuth
        env:
          CLOUDFLARE_OAUTH_TOKEN: ${{ secrets.CLOUDFLARE_OAUTH_TOKEN }}
          CLOUDFLARE_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}
          CLOUDFLARE_OAUTH_EXPIRATION: ${{ secrets.CLOUDFLARE_OAUTH_EXPIRATION }}
        run: |
          mkdir -p "$HOME/.wrangler/config"
          cat > "$HOME/.wrangler/config/default.toml" <<EOF
          oauth_token = "${CLOUDFLARE_OAUTH_TOKEN}"
          expiration_time = "${CLOUDFLARE_OAUTH_EXPIRATION}"
          refresh_token = "${CLOUDFLARE_REFRESH_TOKEN}"
          EOF

      - name: Deploy Production
        run: |
          COMMIT_SHA="${{ needs.rollback.outputs.restored_sha }}"
          if [ -z "${COMMIT_SHA}" ]; then
            COMMIT_SHA="$(git rev-parse HEAD)"
          fi
          COMMIT_MESSAGE="$(git log -1 --pretty=%s)"
          wrangler pages deploy . \
            --project-name gilwell-media \
            --branch main \
            --commit-hash "${COMMIT_SHA}" \
            --commit-message "${COMMIT_MESSAGE}" \
            --commit-dirty true

      - name: Store Release Snapshot
        if: always()
        continue-on-error: true
        env:
          GITHUB_REF_NAME: main
        run: ./scripts/store_release_snapshot.sh production "https://bpmedia.net"
