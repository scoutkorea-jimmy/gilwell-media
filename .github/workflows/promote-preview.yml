name: Promote Preview To Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version being promoted
        required: true
        type: string
      approved_at:
        description: Approval timestamp
        required: true
        type: string
      checklist_ids:
        description: Comma-separated checklist ids
        required: true
        type: string
      preview_sha:
        description: Preview commit SHA
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: promote-preview
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  promote:
    runs-on: ubuntu-latest
    outputs:
      promoted_sha: ${{ steps.promote.outputs.promoted_sha }}
    steps:
      - name: Checkout Preview
        uses: actions/checkout@v6
        with:
          ref: preview
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Promote Preview Snapshot To Main
        id: promote
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_APPROVED_AT: ${{ github.event.inputs.approved_at }}
          INPUT_PREVIEW_SHA: ${{ github.event.inputs.preview_sha }}
        run: |
          git fetch origin main preview
          TARGET_PREVIEW_SHA="${INPUT_PREVIEW_SHA:-}"
          if [ -z "$TARGET_PREVIEW_SHA" ]; then
            TARGET_PREVIEW_SHA="$(git rev-parse origin/preview)"
          fi
          if ! git cat-file -e "${TARGET_PREVIEW_SHA}^{commit}" 2>/dev/null; then
            git fetch origin "${TARGET_PREVIEW_SHA}" --depth=1 || true
          fi
          if ! git cat-file -e "${TARGET_PREVIEW_SHA}^{commit}" 2>/dev/null; then
            echo "Approved preview commit not found: ${TARGET_PREVIEW_SHA}"
            exit 1
          fi
          PREVIOUS_MAIN_SHA="$(git rev-parse origin/main)"
          BACKUP_BRANCH="backup/main-before-promote-v${INPUT_VERSION//./-}-$(date -u +%Y%m%dT%H%M%SZ)"
          git push origin "${PREVIOUS_MAIN_SHA}:refs/heads/${BACKUP_BRANCH}"
          git checkout -B main "${TARGET_PREVIEW_SHA}"
          git push --force-with-lease=refs/heads/main:${PREVIOUS_MAIN_SHA} origin "${TARGET_PREVIEW_SHA}:main"
          echo "promoted_sha=${TARGET_PREVIEW_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: promote
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Checkout Main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Install Wrangler
        run: npm install -g wrangler@4.72.0

      - name: Deploy Production
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION="${INPUT_VERSION:-$(cat VERSION)}"
          COMMIT_SHA="${{ needs.promote.outputs.promoted_sha }}"
          if [ -z "${COMMIT_SHA}" ]; then
            COMMIT_SHA="$(git rev-parse HEAD)"
          fi
          COMMIT_MESSAGE="$(git log -1 --pretty=%s)"
          wrangler pages deploy . \
            --project-name gilwell-media \
            --branch main \
            --commit-hash "${COMMIT_SHA}" \
            --commit-message "${COMMIT_MESSAGE}" \
            --commit-dirty true

      - name: Store Release Snapshot
        if: always()
        continue-on-error: true
        env:
          GITHUB_REF_NAME: main
        run: ./scripts/store_release_snapshot.sh production "https://bpmedia.net"
