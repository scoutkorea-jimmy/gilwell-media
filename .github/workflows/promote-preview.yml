name: Promote Preview To Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version being promoted
        required: true
        type: string
      approved_at:
        description: Approval timestamp
        required: true
        type: string
      checklist_ids:
        description: Comma-separated checklist ids
        required: true
        type: string
      preview_sha:
        description: Preview commit SHA
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: promote-preview
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Preview
        uses: actions/checkout@v6
        with:
          ref: preview
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Promote Preview Snapshot To Main
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_APPROVED_AT: ${{ github.event.inputs.approved_at }}
          INPUT_PREVIEW_SHA: ${{ github.event.inputs.preview_sha }}
        run: |
          git fetch origin main preview
          TARGET_PREVIEW_SHA="${INPUT_PREVIEW_SHA:-}"
          if [ -z "$TARGET_PREVIEW_SHA" ]; then
            TARGET_PREVIEW_SHA="$(git rev-parse origin/preview)"
          fi
          if ! git cat-file -e "${TARGET_PREVIEW_SHA}^{commit}" 2>/dev/null; then
            git fetch origin "${TARGET_PREVIEW_SHA}" --depth=1 || true
          fi
          if ! git cat-file -e "${TARGET_PREVIEW_SHA}^{commit}" 2>/dev/null; then
            echo "Approved preview commit not found: ${TARGET_PREVIEW_SHA}"
            exit 1
          fi
          PREVIOUS_MAIN_SHA="$(git rev-parse origin/main)"
          BACKUP_BRANCH="backup/main-before-promote-v${INPUT_VERSION//./-}-$(date -u +%Y%m%dT%H%M%SZ)"
          git push origin "${PREVIOUS_MAIN_SHA}:refs/heads/${BACKUP_BRANCH}"
          git checkout -B main "${TARGET_PREVIEW_SHA}"
          git push --force-with-lease=refs/heads/main:${PREVIOUS_MAIN_SHA} origin "${TARGET_PREVIEW_SHA}:main"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Wrangler
        run: npm install -g wrangler@4.72.0

      - name: Deploy Production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/deploy_production.sh
