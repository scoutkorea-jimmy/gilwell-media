<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>길웰 미디어 · 관리자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Admin page uses dark body bg */
    body { background: #eceae4; }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════
       LOGIN SCREEN
       Shown until a valid session token is obtained from the API.
       The password is NEVER checked in this file — always on the server.
       ══════════════════════════════════════════════════════════ -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <div class="logo">길웰 미디어</div>
      <div class="sub">Admin · The BP Post</div>

      <label for="pw-input">비밀번호</label>
      <input type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password" />

      <button class="login-btn" id="login-btn" onclick="doLogin()">관리자 입장</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       ADMIN PANEL (shown after login)
       ══════════════════════════════════════════════════════════ -->
  <div class="admin-screen" id="admin-screen">

    <header class="admin-header">
      <div>
        <span class="logo">길웰 미디어</span>
        <span class="badge">Admin</span>
      </div>
      <div class="header-right">
        <a href="index.html" target="_blank">← 홈페이지 보기</a>
        <button class="logout-btn" onclick="doLogout()">로그아웃</button>
      </div>
    </header>

    <div class="admin-body">

      <!-- ── LEFT: WRITE / EDIT PANEL ── -->
      <div>
        <div class="panel" style="margin-bottom:24px;">

          <!-- Panel header with stats -->
          <div class="panel-header">
            <h2 id="form-title">새 게시글 작성</h2>
          </div>

          <!-- Stats -->
          <div class="stats-row">
            <div class="stat-item">
              <span class="stat-num" id="stat-korea">0</span>
              <span class="stat-label">Korea</span>
            </div>
            <div class="stat-item">
              <span class="stat-num" id="stat-apr">0</span>
              <span class="stat-label">APR</span>
            </div>
            <div class="stat-item">
              <span class="stat-num" id="stat-worm">0</span>
              <span class="stat-label">Worm</span>
            </div>
          </div>

          <!-- Form -->
          <div class="panel-body">

            <!-- Category & date row -->
            <div class="form-row">
              <div class="form-group">
                <label for="art-category">카테고리</label>
                <select id="art-category" onchange="updateCatPreview()">
                  <option value="korea">Korea — 한국스카우트연맹</option>
                  <option value="apr">APR — 아시아태평양</option>
                  <option value="worm">Worm — 세계스카우트연맹</option>
                </select>
                <!-- Visual category tag preview -->
                <span class="cat-preview tag-korea" id="cat-preview">Korea</span>
              </div>
              <div class="form-group">
                <label>게재일</label>
                <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);padding-top:12px;" id="art-date-display"></div>
              </div>
            </div>

            <!-- Title -->
            <div class="form-group">
              <label for="art-title">제목 *</label>
              <input type="text" id="art-title" placeholder="게시글 제목을 입력하세요" maxlength="200" />
            </div>

            <!-- Content -->
            <div class="form-group">
              <label for="art-content">본문 *</label>
              <textarea id="art-content" placeholder="게시글 내용을 작성하세요...&#10;&#10;줄바꿈은 그대로 표시됩니다."></textarea>
            </div>

            <!-- Image URL (optional) -->
            <div class="form-group">
              <label for="art-image">이미지 URL (선택)</label>
              <input type="url" id="art-image" placeholder="https://example.com/image.jpg" />
              <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px;">
                https:// 로 시작하는 이미지 주소를 입력하세요
              </div>
            </div>

            <button class="submit-btn" id="submit-btn" onclick="savePost()">게재하기</button>
            <button class="cancel-btn" id="cancel-btn" onclick="cancelEdit()">작성 취소</button>
          </div>
        </div>
      </div>

      <!-- ── RIGHT: ARTICLE LIST ── -->
      <div class="panel">
        <div class="panel-header">
          <h2>게재된 게시글</h2>
          <span class="count" id="article-count">0건</span>
        </div>

        <!-- Category filter tabs for the admin list -->
        <div style="display:flex;border-bottom:1px solid var(--border);">
          <button id="admin-tab-all"   onclick="adminFilter('all')"   style="flex:1;padding:10px 0;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;background:var(--black);color:var(--white);">전체</button>
          <button id="admin-tab-korea" onclick="adminFilter('korea')" style="flex:1;padding:10px 0;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;background:var(--bg);color:var(--muted);">Korea</button>
          <button id="admin-tab-apr"   onclick="adminFilter('apr')"   style="flex:1;padding:10px 0;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;background:var(--bg);color:var(--muted);">APR</button>
          <button id="admin-tab-worm"  onclick="adminFilter('worm')"  style="flex:1;padding:10px 0;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;background:var(--bg);color:var(--muted);">Worm</button>
        </div>

        <div class="article-list" id="article-list">
          <div class="list-empty">로드 중…</div>
        </div>
      </div>

    </div><!-- /admin-body -->
  </div><!-- /admin-screen -->

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/js/main.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    // ── Admin list filter tabs ────────────────────────────────
    var adminCurrentFilter = 'all';

    window.adminFilter = function (cat) {
      adminCurrentFilter = cat;
      ['all','korea','apr','worm'].forEach(function (c) {
        var tab = document.getElementById('admin-tab-' + c);
        if (!tab) return;
        if (c === cat) {
          tab.style.background = 'var(--black)';
          tab.style.color      = 'var(--white)';
        } else {
          tab.style.background = 'var(--bg)';
          tab.style.color      = 'var(--muted)';
        }
      });
      // Re-render the list filtered
      renderAdminList();
    };

    // Expose renderAdminList so admin.js can call it
    var _rawPosts = [];

    // Override renderList from admin.js to support tabs
    // admin.js calls renderList() internally; we intercept via the article-list element
    // The tab filter is applied here in the inline script.

    // Watch for posts array updates via a custom event
    document.addEventListener('admin:postsLoaded', function (e) {
      _rawPosts = e.detail;
      renderAdminList();
    });

    function renderAdminList() {
      var list  = document.getElementById('article-list');
      var count = document.getElementById('article-count');
      var filtered = adminCurrentFilter === 'all'
        ? _rawPosts
        : _rawPosts.filter(function (p) { return p.category === adminCurrentFilter; });

      if (count) count.textContent = filtered.length + '건';

      if (filtered.length === 0) {
        list.innerHTML = '<div class="list-empty">게시글이 없습니다</div>';
        return;
      }

      list.innerHTML = filtered.map(function (p) {
        var cat = GW.CATEGORIES[p.category] || GW.CATEGORIES.korea;
        return (
          '<div class="article-item">' +
            '<div class="article-item-content">' +
              '<div style="margin-bottom:6px;">' +
                '<span style="display:inline-block;font-family:\'DM Mono\',monospace;font-size:9px;' +
                'letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;' +
                'color:#f5f3ee;background:' + cat.color + ';">' + cat.label + '</span>' +
              '</div>' +
              '<h4>' + GW.escapeHtml(p.title) + '</h4>' +
              '<div class="item-meta">' + GW.formatDate(p.created_at) + '</div>' +
            '</div>' +
            '<div class="item-actions">' +
              '<button class="btn-edit"   onclick="editPost('   + p.id + ')">수정</button>' +
              '<button class="btn-delete" onclick="deletePost(' + p.id + ')">삭제</button>' +
            '</div>' +
          '</div>'
        );
      }).join('');
    }
  </script>
</body>
</html>
